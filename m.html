<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#f7f4ef">
<title>人相兵法</title>

<style>
/* ===== 色票（沿用桌機版 + 手機版新增） ===== */
:root{
  --bg:#f7f4ef;
  --sidebar:#e8dfc8;
  --hover:#ece5d4;
  --border:#d4c9b0;
  --nav:#1e2127;
  --text:#1c1c1c;
  --text-2:#3d3b39;
  --text-3:#716b60;
  --dark:#1e2127;
  --active:#C17A5A;
  --static:#7A9E7E;
  --accent:#c03830;
  --gold:#9a7c4a;
  --warn:#d4a017;
  --zebra:#f0ebe0;
  --pre-bg:#f0e8d8;
  --pre-fc:#8a6a3a;
  --luck-bg:#dce8e4;
  --luck-fc:#3a6a5a;
  --post-bg:#e4e8dc;
  --post-fc:#4a6a3a;

  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);

  --nav-h:48px;
  --tab-h:56px;
}

/* ===== 全域 reset ===== */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden}
body{
  background:var(--bg);
  font-family:'Noto Sans TC','PingFang TC','Heiti TC',sans-serif;
  color:var(--text);
  font-size:14px;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}

/* ===== STAGING banner ===== */
#m-staging-banner{
  display:none;
  position:fixed;
  top:0;left:0;right:0;
  height:24px;
  padding:0 12px;
  background:#e89c3c;
  color:#fff;
  font-size:11px;
  font-weight:500;
  letter-spacing:1px;
  align-items:center;
  justify-content:center;
  z-index:200;
  padding-top:var(--safe-top);
  height:calc(24px + var(--safe-top));
}
body.m-staging-mode #m-staging-banner{display:flex}
body.m-staging-mode .m-nav{top:calc(24px + var(--safe-top));padding-top:0}
body.m-staging-mode .m-main{top:calc(var(--nav-h) + 24px + var(--safe-top))}

/* ===== 頂部 nav ===== */
.m-nav{
  position:fixed;
  top:0;left:0;right:0;
  height:calc(var(--nav-h) + var(--safe-top));
  padding-top:var(--safe-top);
  background:var(--nav);
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding-left:16px;
  padding-right:16px;
  z-index:100;
  border-bottom:1px solid rgba(255,255,255,0.05);
}
.m-nav-title{
  font-size:16px;
  font-weight:400;
  letter-spacing:2px;
}
.m-nav-user{
  font-size:13px;
  color:rgba(255,255,255,0.85);
  letter-spacing:1px;
  cursor:pointer;
}
.m-nav-user.is-guest{color:rgba(255,255,255,0.5)}

/* ===== 中間 main ===== */
.m-main{
  position:fixed;
  top:calc(var(--nav-h) + var(--safe-top));
  bottom:calc(var(--tab-h) + var(--safe-bottom));
  left:0;right:0;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
}
.m-tab-page{
  display:none;
  padding:20px 16px;
}
.m-tab-page.active{display:block}

.m-placeholder{
  text-align:center;
  padding:60px 20px;
  color:var(--text-3);
}
.m-placeholder-title{
  font-size:18px;
  color:var(--text);
  margin-bottom:12px;
  letter-spacing:2px;
}
.m-placeholder-desc{
  font-size:13px;
  line-height:1.8;
  color:var(--text-3);
}
.m-placeholder-step{
  display:inline-block;
  margin-top:16px;
  padding:4px 12px;
  background:var(--hover);
  border:1px solid var(--border);
  border-radius:12px;
  font-size:11px;
  color:var(--text-3);
  letter-spacing:1px;
}

/* ===== 底部 3 tab bar ===== */
.m-tabbar{
  position:fixed;
  bottom:0;left:0;right:0;
  height:calc(var(--tab-h) + var(--safe-bottom));
  padding-bottom:var(--safe-bottom);
  background:#fff;
  border-top:1px solid var(--border);
  display:flex;
  z-index:100;
}
.m-tab{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  color:var(--text-3);
  font-size:11px;
  letter-spacing:1px;
  transition:color 0.15s;
  position:relative;
}
.m-tab.active{color:var(--active)}
.m-tab-icon{
  width:22px;
  height:22px;
  margin-bottom:3px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:18px;
}
.m-tab.active .m-tab-icon{transform:scale(1.05)}

/* ===== 登入頁 ===== */
.m-login{
  position:fixed;
  inset:0;
  background:var(--bg);
  z-index:9000;
  display:none;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:40px 32px;
  padding-top:calc(60px + var(--safe-top));
  padding-bottom:calc(40px + var(--safe-bottom));
}
.m-login.active{display:flex}
.m-login-logo{
  font-size:36px;
  font-weight:400;
  letter-spacing:8px;
  color:var(--text);
  margin-bottom:8px;
  text-align:center;
}
.m-login-sub{
  font-size:18px;
  font-weight:400;
  letter-spacing:6px;
  color:var(--text-2);
  margin-bottom:60px;
  text-align:center;
}
.m-login-hint{
  font-size:13px;
  color:var(--text-3);
  letter-spacing:2px;
  margin-bottom:24px;
  text-align:center;
}
.m-login-btn{
  width:100%;
  max-width:340px;
  height:56px;
  background:#fff;
  color:var(--text);
  border:1px solid var(--border);
  border-radius:8px;
  font-size:16px;
  letter-spacing:2px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  cursor:pointer;
  transition:all 0.15s;
}
.m-login-btn[disabled]{
  opacity:0.5;
  pointer-events:none;
  cursor:not-allowed;
}
.m-login-btn:active{
  background:var(--hover);
  transform:scale(0.98);
}
.m-login-btn svg{flex-shrink:0}
.m-login-loading{
  margin-top:24px;
  font-size:13px;
  color:var(--text-3);
  letter-spacing:2px;
  display:none;
}
.m-login.is-loading .m-login-btn{opacity:0.5;pointer-events:none}
.m-login.is-loading .m-login-loading{display:block}

/* ===== 拒絕頁 ===== */
.m-denied{
  position:fixed;
  inset:0;
  background:var(--bg);
  z-index:9100;
  display:none;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:40px;
  text-align:center;
}
.m-denied.active{display:flex}
.m-denied-title{
  font-size:20px;
  font-weight:400;
  letter-spacing:3px;
  color:var(--text);
  margin-bottom:16px;
}
.m-denied-desc{
  font-size:14px;
  color:var(--text-3);
  line-height:1.8;
  margin-bottom:32px;
  letter-spacing:1px;
}
.m-denied-btn{
  padding:12px 32px;
  background:var(--dark);
  color:#fff;
  border-radius:8px;
  font-size:14px;
  letter-spacing:2px;
}

/* ===== 全域載入遮罩 ===== */
.m-loading{
  position:fixed;
  inset:0;
  background:var(--bg);
  z-index:9500;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:16px;
}
.m-loading.is-hidden{display:none}
.m-loading-spinner{
  width:32px;
  height:32px;
  border:3px solid var(--border);
  border-top-color:var(--active);
  border-radius:50%;
  animation:m-spin 0.8s linear infinite;
}
@keyframes m-spin{to{transform:rotate(360deg)}}
.m-loading-text{
  font-size:13px;
  color:var(--text-3);
  letter-spacing:2px;
}

/* ===== 寬度警告（≥768 看到 m.html 時顯示）===== */
.m-width-warn{
  display:none;
  position:fixed;
  inset:0;
  background:var(--bg);
  z-index:9999;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:40px;
  text-align:center;
}
.m-width-warn h2{
  font-size:20px;
  font-weight:400;
  letter-spacing:3px;
  margin-bottom:16px;
  color:var(--text);
}
.m-width-warn p{
  font-size:14px;
  color:var(--text-3);
  line-height:1.8;
  margin-bottom:24px;
}
.m-width-warn a{
  display:inline-block;
  padding:12px 28px;
  background:var(--dark);
  color:#fff;
  text-decoration:none;
  border-radius:8px;
  letter-spacing:2px;
  font-size:14px;
}
@media (min-width:768px){
  .m-width-warn{display:flex}
  .m-nav,.m-main,.m-tabbar,.m-login,.m-denied,.m-loading,#m-staging-banner{display:none !important}
}

/* ===== Debug 面板（暫時用） ===== */
.m-debug-toggle{
  position:fixed;
  top:calc(8px + var(--safe-top));
  right:8px;
  width:32px;
  height:32px;
  background:rgba(192,56,48,0.9);

  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:16px;
  z-index:99999;

  cursor:pointer;
}
.m-debug-panel{
  position:fixed;
  top:calc(48px + var(--safe-top));
  right:8px;
  left:8px;
  bottom:8px;
  background:rgba(0,0,0,0.92);
  color:#0f0;
  font-family:'Courier New',monospace;
  font-size:11px;
  line-height:1.4;
  padding:12px;
  border-radius:8px;
  overflow-y:auto;
  z-index:99998;
  display:none;
  -webkit-overflow-scrolling:touch;
}
.m-debug-panel.active{display:block}
.m-debug-line{
  margin-bottom:4px;

}
.m-debug-line.error{color:#ff6b6b}
.m-debug-line.warn{color:#ffd93d}
.m-debug-line.info{color:#6bcfff}
.m-debug-line .ts{color:#888;margin-right:4px}
.m-debug-clear{
  position:fixed;

  right:48px;
  height:32px;
  padding:0 12px;
  background:rgba(0,0,0,0.7);
  color:#fff;
  border-radius:16px;
  font-size:11px;
  z-index:99999;
  display:none;
  cursor:pointer;
}
body.m-debug-on .m-debug-clear{display:block}

/* 桌機誤入警告頁時藏 debug 面板（避免穿透到警告畫面） */
@media (min-width:768px){
  .m-debug-toggle,
  .m-debug-panel,
  .m-debug-clear{display:none !important}
}
</style>
</head>

<script>
/* ============================================================
   Debug 面板（攔截 console + window.onerror）
   ============================================================ */
(function(){
  const panel=document.getElementById('m-debug-panel');
  const toggle=document.getElementById('m-debug-toggle');
  const clearBtn=document.getElementById('m-debug-clear');

  function addLine(level,args){
    const line=document.createElement('div');
    line.className='m-debug-line '+level;
    const ts=new Date().toTimeString().substr(0,8);
    const tsSpan=document.createElement('span');
    tsSpan.className='ts';
    tsSpan.textContent=ts;
    line.appendChild(tsSpan);
    const msg=Array.from(args).map(function(a){
      if(a===null) return 'null';
      if(a===undefined) return 'undefined';
      if(typeof a==='object'){
        try{return JSON.stringify(a,null,2)}catch(e){return String(a)}
      }
      return String(a);
    }).join(' ');
    line.appendChild(document.createTextNode(msg));
    panel.appendChild(line);
    panel.scrollTop=panel.scrollHeight;
  }

  // 攔截 console
  const origLog=console.log;
  const origErr=console.error;
  const origWarn=console.warn;
  const origInfo=console.info;
  console.log=function(){addLine('info',arguments);origLog.apply(console,arguments)};
  console.error=function(){addLine('error',arguments);origErr.apply(console,arguments)};
  console.warn=function(){addLine('warn',arguments);origWarn.apply(console,arguments)};
  console.info=function(){addLine('info',arguments);origInfo.apply(console,arguments)};

  // 攔截全域錯誤
  window.addEventListener('error',function(ev){
    addLine('error',['[ERROR]',ev.message,'at',ev.filename+':'+ev.lineno]);
  });
  window.addEventListener('unhandledrejection',function(ev){
    addLine('error',['[UNHANDLED]',ev.reason&&ev.reason.message?ev.reason.message:String(ev.reason)]);
  });

  // 點擊圖示開關面板
  toggle.addEventListener('click',function(){
    panel.classList.toggle('active');
    document.body.classList.toggle('m-debug-on');
  });

  // 清空按鈕
  clearBtn.addEventListener('click',function(){
    panel.innerHTML='';
  });

  // 顯示初始狀態
  console.log('[Debug] 面板就緒');
  console.log('[Debug] hostname =',window.location.hostname);
  console.log('[Debug] href =',window.location.href);
})();

/* ============================================================
   白名單檢查（沿用桌機版）
   ============================================================ */
const ADMIN_UIDS=[
  'XT1Err9cmnNokgMQKUrGUj3ishG2',     // production admin
  'ARGLfFp3HqbWMtN7CAoAxR4rHhm1'      // staging admin
];

async function checkWhitelist(user){
  if(ADMIN_UIDS.includes(user.uid)) return true;
  const email=(user.email||'').toLowerCase();
  if(!email) return false;
  try{
    const snap=await db.collection('allowedUsers').doc(email).get();
    return snap.exists;
  }catch(e){
    console.log('白名單檢查失敗',e);
    return false;

}

const elMain=document.getElementById('m-main');
const elTabbar=document.getElementById('m-tabbar');
const elNavUser=document.getElementById('m-nav-user');

function showLoading(){
  elLoading.classList.remove('is-hidden');
  elLogin.classList.remove('active');
  elDenied.classList.remove('active');
  elNav.style.display='none';
  elMain.style.display='none';
  elTabbar.style.display='none';
}

function showLogin(){
  elLoading.classList.add('is-hidden');
  elLogin.classList.add('active');
  elDenied.classList.remove('active');
  elNav.style.display='none';
  elMain.style.display='none';
  elTabbar.style.display='none';
}

function showDenied(){
  elLoading.classList.add('is-hidden');
  elLogin.classList.remove('active');
  elDenied.classList.add('active');
  elNav.style.display='none';
  elMain.style.display='none';
  elTabbar.style.display='none';
}

function showApp(displayName){
  elLoading.classList.add('is-hidden');
  elLogin.classList.remove('active');
  elDenied.classList.remove('active');
  elNav.style.display='flex';
  elMain.style.display='block';
  elTabbar.style.display='flex';
  if(displayName){
    elNavUser.textContent=displayName;
    elNavUser.classList.remove('is-guest');
  }
}

/* ============================================================
   Google 登入按鈕（手機用 Redirect）
   ============================================================ */
document.getElementById('m-login-btn').addEventListener('click',async function(){
  elLogin.classList.add('is-loading');
  try{
    const provider=new firebase.auth.GoogleAuthProvider();
    await auth.signInWithRedirect(provider);
    // signInWithRedirect 不會在這裡返回，會跳到 Google 頁面
  }catch(e){
    console.error('登入失敗',e);
    elLogin.classList.remove('is-loading');
    alert('登入失敗：'+(e.message||e));
  }
});

/* ============================================================
   登入流程：先 await setPersistence，再啟動 redirect 處理 + auth 監聽
   ============================================================ */
async function initAuth(){
  console.log('[Auth] initAuth 開始');

  // Step 1：等 setPersistence 完成（修 race condition 關鍵）
  try{
    await auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);
    console.log('[Auth] setPersistence(LOCAL) 完成');
  }catch(e){
    console.error('[Auth] setPersistence 失敗',e&&e.message?e.message:e);
    // 失敗也繼續，讓 SDK 用預設 persistence
  }

  // Step 2：處理 Redirect 返回結果（從 Google 跳回時必須）
  try{
    console.log('[Auth] 開始處理 getRedirectResult');
    const result=await auth.getRedirectResult();
    if(result&&result.user){
      console.log('[Auth] getRedirectResult 拿到 user：',result.user.email||result.user.uid);
    }else{
      console.log('[Auth] getRedirectResult 沒有 user（不是 redirect 返回，或已處理過）');
    }
  }catch(e){
    console.error('[Auth] getRedirectResult 失敗',e&&e.code,e&&e.message?e.message:e);
  }

  // Step 3：啟動 onAuthStateChanged 監聽
  console.log('[Auth] 啟動 onAuthStateChanged');
  auth.onAuthStateChanged(async function(user){
    console.log('[Auth] onAuthStateChanged 觸發，user =',user?(user.email||user.uid):'null');

    if(user){
      // 已登入：檢查白名單
      showLoading();
      try{
        console.log('[Auth] 開始檢查白名單');
        const allowed=await checkWhitelist(user);
        console.log('[Auth] 白名單檢查結果：',allowed);

        if(!allowed){
          console.log('[Auth] 白名單未通過，登出並顯示拒絕頁');
          await auth.signOut();
          showDenied();
          return;
        }

        // 讀取 / 建立 user document
        let displayName=user.displayName||(user.email||'').split('@')[0];
        try{
          const userDoc=await db.collection('users').doc(user.uid).get();
          if(userDoc.exists){
            displayName=userDoc.data().displayName||displayName;
            console.log('[Auth] 讀到既有 user document，displayName =',displayName);
          }else{
            console.log('[Auth] user document 不存在，建立中');
            await db.collection('users').doc(user.uid).set({
              displayName:user.displayName||'',
              email:user.email||'',
              role:'student',
              createdAt:new Date().toISOString()
            });
            console.log('[Auth] user document 建立完成');
          }
        }catch(e){
          console.error('[Auth] 讀取/建立 user document 失敗',e&&e.message?e.message:e);
        }

        console.log('[Auth] 呼叫 showApp，displayName =',displayName);
        showApp(displayName);
      }catch(e){
        console.error('[Auth] 登入後處理失敗',e&&e.message?e.message:e);
        showDenied();
      }
    }else{
      // 未登入：顯示登入頁，並啟用登入按鈕
      console.log('[Auth] 未登入，顯示登入頁，啟用登入按鈕');
      showLogin();
      const btn=document.getElementById('m-login-btn');
      if(btn) btn.disabled=false;
    }
  });
}

initAuth();

/* ============================================================
   Tab 切換
   ============================================================ */
(function(){
  const tabs=document.querySelectorAll('.m-tab');
  const pages={
    home:document.getElementById('m-page-home'),
    input:document.getElementById('m-page-input'),
    report:document.getElementById('m-page-report')
  };
  tabs.forEach(function(btn){
    btn.addEventListener('click',function(){
      const key=btn.dataset.tab;
      tabs.forEach(function(b){b.classList.toggle('active',b===btn)});
      Object.keys(pages).forEach(function(k){
        pages[k].classList.toggle('active',k===key);
      });
      document.querySelector('.m-main').scrollTop=0;
    });
  });
})();

/* ============================================================
   頂部姓名點擊登出（簡單版，未來可改下拉選單）
   ============================================================ */
elNavUser.addEventListener('click',async function(){
  if(elNavUser.classList.contains('is-guest')) return;
  if(confirm('要登出嗎？')){
    await auth.signOut();
    location.reload();
  }
});
</script>
