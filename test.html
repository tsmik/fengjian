/* ===== recalcFromObs ===== */
function recalcFromObs(){
  const hasAny=Object.keys(obsData).length>0;
  if(!hasAny){for(let d=0;d<4;d++)data[d]=Array(9).fill(null);return;}
  const ck=id=>!!obsData[id],cnt=(...c)=>c.filter(Boolean).length;let s;
  // Dim 0 形勢 pass→A
  s=cnt(ck('h01'),ck('h02'),ck('h07')&&!ck('h09'),ck('h10'),ck('h11'));data[0][0]=s>=3?'A':'B';
  s=cnt(ck('f02'),ck('f04'),!ck('f01'));data[0][1]=s>=3?'A':'B';
  const d0eL=cnt(ck('eL01'),ck('eL04')&&ck('eL08')&&ck('eL09'),ck('eL02'),ck('eL10')),d0eR=cnt(ck('eR01'),ck('eR04')&&ck('eR08')&&ck('eR09'),ck('eR02'),ck('eR10'));
  data[0][4]=(d0eL+d0eR)>=8?'A':'B';
  const d0mL=cnt(ck('mL01'),ck('mL05'),!ck('mL04'),!ck('mL06')),d0mR=cnt(ck('mR01'),ck('mR05'),!ck('mR04'),!ck('mR06'));
  data[0][5]=(d0mL+d0mR)>=8?'A':'B';
  const d0yL=cnt(ck('yL01a')||ck('yL01b'),ck('yL04'),ck('yL05')),d0yR=cnt(ck('yR01a')||ck('yR01b'),ck('yR04'),ck('yR05'));
  data[0][6]=(d0yL+d0yR)>=6?'A':'B';
  const d0n=cnt(ck('n01'),ck('n02'),ck('n04'),!ck('n05'));data[0][7]=d0n>=4?'A':'B';
  const d0k=cnt(ck('k01'),ck('k02'),ck('k03'),!ck('k04'));data[0][8]=d0k>=4?'A':'B';
  s=cnt(d0mL>=4,d0mR>=4,d0yL>=3,d0yR>=3,d0n>=4,ck('qL03'),ck('qR03'));data[0][2]=s>=4?'A':'B';
  s=cnt(d0k>=4,ck('r01'),ck('r02'),ck('g01'),ck('iL01'),ck('iR01'));data[0][3]=s>=3?'A':'B';
  // Dim 1 經緯 pass→A
  s=(ck('h03')?2:0)+(ck('h08')?1:0)+(ck('h12')?2:0);data[1][0]=s>=3?'A':'B';
  s=cnt(!ck('f01')&&ck('f03'),ck('f07'),ck('f06'));data[1][1]=s>=3?'A':'B';
  const d1eL=cnt(ck('eL02'),ck('eL03'),ck('eL05'),ck('eL06'),ck('eL07')),d1eR=cnt(ck('eR02'),ck('eR03'),ck('eR05'),ck('eR06'),ck('eR07'));
  data[1][4]=(d1eL+d1eR+(ck('e00')?1:0))>=11?'A':'B';
  const d1mL=cnt(ck('mL07'),ck('mL08'),ck('mL09'),ck('mL01'),ck('mL10'),ck('mL11'),ck('mL16'),ck('mL12'),ck('mL13'),ck('mL14'),ck('mL01')&&ck('mL04'),ck('m00'));
  const d1mR=cnt(ck('mR07'),ck('mR08'),ck('mR09'),ck('mR01'),ck('mR10'),ck('mR11'),ck('mR16'),ck('mR12'),ck('mR13'),ck('mR14'),ck('mR01')&&ck('mR04'),ck('m00'));
  data[1][5]=(d1mL>=7&&d1mR>=7)?'A':'B';
  const d1yL=cnt(ck('yL01a'),ck('yL02'),ck('yL04'),ck('yL05')),d1yR=cnt(ck('yR01a'),ck('yR02'),ck('yR04'),ck('yR05'));
  data[1][6]=(d1yL+d1yR+(ck('y00')?1:0))>=9?'A':'B';
  const d1n=cnt(ck('n02'),ck('n03'),ck('n01'),!ck('n05'));data[1][7]=d1n>=4?'A':'B';
  const d1k=cnt(ck('k01'),ck('k07'),ck('k05'),ck('k10'));data[1][8]=d1k>=4?'A':'B';
  const d1qL=ck('qL01')&&ck('qL02')&&ck('qL03'),d1qR=ck('qR01')&&ck('qR02')&&ck('qR03');
  s=cnt(d1mL>=7,d1mR>=7,d1yL>=4,d1yR>=4,d1n>=4,d1qL,d1qR);data[1][2]=s>=4?'A':'B';
  s=cnt(d1k>=4,ck('r01'),ck('r02'),ck('g02'),ck('g04'),!ck('iL02')&&!ck('iR02'),ck('i00'));data[1][3]=s>=3?'A':'B';
  // Dim 2 方圓 pass→B=圓
  s=cnt(ck('h04L'),ck('h04R'),!ck('h09'),ck('h10'),ck('h11'));data[2][0]=s>=3?'B':'A';
  s=cnt(ck('f03'),ck('f04'));data[2][1]=s>=2?'B':'A';
  const d2eL=cnt(ck('eL04'),ck('eL08'),ck('eL09')),d2eR=cnt(ck('eR04'),ck('eR08'),ck('eR09'));
  data[2][4]=(d2eL+d2eR)>=6?'B':'A';
  const d2mL=cnt(ck('mL02'),!ck('mL04')),d2mR=cnt(ck('mR02'),!ck('mR04'));
  data[2][5]=(d2mL+d2mR)>=4?'B':'A';
  const d2yL=cnt(ck('yL03'),ck('yL04'),ck('yL05')),d2yR=cnt(ck('yR03'),ck('yR04'),ck('yR05'));
  data[2][6]=(d2yL+d2yR)>=6?'B':'A';
  const d2n=cnt(ck('n01'),!ck('n05'));data[2][7]=d2n>=2?'B':'A';
  const d2k=cnt(ck('k02'),ck('k08'),ck('k03'));data[2][8]=d2k>=3?'B':'A';
  s=cnt(d2mL>=2,d2mR>=2,d2yL>=3,d2yR>=3,d2n>=2,ck('qL03')&&ck('qL01'),ck('qR03')&&ck('qR01'));data[2][2]=s>=4?'B':'A';
  s=cnt(d2k>=3,ck('r01'),ck('r02'),ck('g03'),ck('iL03'),ck('iR03'));data[2][3]=s>=3?'B':'A';
  // Dim 3 曲直 pass→B=直
  s=(ck('h05')?2:0)+(ck('h06')?1:0)+(ck('h13')?1:0)+(ck('h14')?1:0);data[3][0]=s>=3?'B':'A';
  s=cnt(ck('f05'),ck('f07'));data[3][1]=s>=2?'B':'A';
  const d3eL=cnt(ck('eL02'),ck('eL03'),ck('eL01')),d3eR=cnt(ck('eR02'),ck('eR03'),ck('eR01'));
  data[3][4]=(d3eL+d3eR)>=6?'B':'A';
  const d3mL=cnt(ck('mL03')&&!ck('mL04'),ck('mL15')),d3mR=cnt(ck('mR03')&&!ck('mR04'),ck('mR15'));
  data[3][5]=(d3mL>=1&&d3mR>=1)?'B':'A';
  const d3yL=cnt(ck('yL01a'),!ck('yL04'),!ck('yL05')),d3yR=cnt(ck('yR01a'),!ck('yR04'),!ck('yR05'));
  data[3][6]=(d3yL+d3yR)>=6?'B':'A';
  const d3n=cnt(ck('n02'),ck('n01'),ck('n03'));data[3][7]=d3n>=3?'B':'A';
  const d3k=cnt(ck('k09'),ck('k03'),ck('k05'));data[3][8]=d3k>=3?'B':'A';
  s=cnt(d3mL>=1,d3mR>=1,d3yL>=3,d3yR>=3,d3n>=3,ck('qL04'),ck('qR04'));data[3][2]=s>=4?'B':'A';
  s=cnt(d3k>=3,ck('r03'),ck('g02'),ck('g04'),ck('iL04'),ck('iR04'));data[3][3]=s>=3?'B':'A';
}

/* ===== 觀察頁 ===== */
function renderObsSidebar(){
  const el=document.getElementById('obs-sidebar');
  let html='<div class="cat-header" style="background:#4a453e;color:#fcfaf8">觀察條件</div>';
  OBS_PARTS.forEach((part,i)=>{
    let ck=0,tot=0;part.groups.forEach(gi=>{const g=OBS_GROUPS[gi];tot+=g.items.length;ck+=g.items.filter(it=>obsData[it.id]).length;});
    const active=i===curObsPart,st=active?'background:white;border-left:8px solid var(--dark)':'background:var(--sidebar);color:var(--text)';
    html+='<div class="dim-item'+(active?' active':'')+'" style="'+st+'" onclick="gotoObsPart('+i+')"><span>'+part.name+'</span><span style="font-size:clamp(12px,1.4vw,15px);color:#999;font-weight:700">'+ck+'/'+tot+'</span></div>';
  });
  html+='<div class="dim-item" style="background:var(--dark);color:#fff;font-weight:900;position:sticky;bottom:0;margin-top:auto;" onclick="showDimPage()"><span>進入評分</span><span style="font-size:18px">→</span></div>';
  html+='<div style="height:max(20px,env(safe-area-inset-bottom));background:var(--dark);"></div>';
  el.innerHTML=html;
}
function renderObsMain(){
  const part=OBS_PARTS[curObsPart];
  document.getElementById('obs-title').innerText=part.name;
  const area=document.getElementById('obs-area');let html='';
  part.groups.forEach(gi=>{
    const group=OBS_GROUPS[gi],items=group.items,cc=items.filter(it=>obsData[it.id]).length;
    html+='<div class="detail-group"><div class="detail-group-header" onclick="toggleDetailGroup(this)"><span>'+group.name+'（'+cc+'/'+items.length+'）</span><span class="toggle-arrow">▼</span></div><div class="detail-group-body">';
    for(const it of items){html+='<div class="detail-check"><input type="checkbox" id="obs-'+it.id+'" '+(obsData[it.id]?'checked':'')+' onchange="onObsChange(\''+it.id+'\',this.checked)"><label for="obs-'+it.id+'">'+it.label+'</label></div>';}
    html+='</div></div>';
  });
  area.innerHTML=html;
}
function renderObsFooter(){
  let tot=0,ck=0;OBS_GROUPS.forEach(g=>{tot+=g.items.length;ck+=g.items.filter(it=>obsData[it.id]).length;});
  document.getElementById('obs-footer').innerHTML='<div class="result-row"><div class="result-mid" style="background:var(--sidebar);color:var(--text);border-color:var(--border);font-size:clamp(14px,1.6vw,18px)">已觀察 '+ck+' / '+tot+' 項</div></div>';
}
function gotoObsPart(i){curObsPart=i;renderObsSidebar();renderObsMain();}
function onObsChange(id,checked){
  if(checked)obsData[id]=true;else delete obsData[id];
  localStorage.setItem('obs_data_v1',JSON.stringify(obsData));
  recalcFromObs();save();
  const area=document.getElementById('obs-area'),st=area.scrollTop;

    if(!resp.ok)throw new Error('API 錯誤 '+resp.status+': '+await resp.text());
    const result=await resp.json(),text=result.content[0].text;
    const sections=text.split(/【(性格分析|事業運勢|人際關係|健康提示|流年運程)】/).filter(s=>s.trim());
    let html='<div class="ai-section"><h3>風鑑師 AI 評析</h3>';for(let i=0;i<sections.length;i+=2){html+='<div class="ai-block"><h4>【'+sections[i]+'】</h4><p>'+(sections[i+1]||'').trim()+'</p></div>';}html+='</div>';area.innerHTML=html;
  }catch(e){area.innerHTML='<div class="ai-section"><p style="color:#c0392b;font-weight:700;">評析失敗：'+e.message+'</p></div>';}
  btn.disabled=false;btn.innerText='生成 AI 評析';
}

window.onload=()=>{
  const savedName=localStorage.getItem('rxbf_username');if(savedName)document.getElementById('entry-name').value=savedName;
  const savedKey=localStorage.getItem('anthropic_api_key');if(savedKey)document.getElementById('entry-api-key').value=savedKey;
  document.getElementById('entry-api-key').addEventListener('change',e=>{const val=e.target.value.trim();if(val)localStorage.setItem('anthropic_api_key',val);else localStorage.removeItem('anthropic_api_key');});
  document.getElementById('entry-name').addEventListener('keydown',e=>{if(e.key==='Enter')startApp();});
  document.getElementById('name-edit-input').addEventListener('keydown',e=>{if(e.key==='Enter')confirmEditName();});
};
</script>
