<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>人相兵法 — 管理介面</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#f7f4ef;--sidebar:#e8dfc8;--hover:#ece5d4;--border:#d4c9b0;--nav:#1e2127;--text:#1c1c1c;--text-2:#3d3b39;--text-3:#716b60;--active:#c03830;--static:#7A9E7E;--dynamic:#C17A5A;--dark:#1e2127}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);font-family:'Noto Sans TC',sans-serif;height:100vh;overflow:hidden;color:var(--text);display:flex;flex-direction:column}
#top-bar{height:48px;background:var(--nav);display:flex;align-items:center;padding:0 20px;color:#e8e0d0;font-size:15px;font-weight:400;letter-spacing:3px;gap:16px}
#top-bar .status{font-size:12px;font-weight:400;color:rgba(255,255,255,0.5);margin-left:auto}
#top-bar button{height:32px;padding:0 16px;border:none;border-radius:4px;font-size:13px;font-weight:400;cursor:pointer;font-family:'Noto Sans TC',sans-serif;letter-spacing:1px}
.btn-save{background:var(--static);color:white}
.btn-load{background:var(--dynamic);color:white}
#tab-bar{display:flex;gap:0;background:var(--sidebar);border-bottom:1px solid var(--border)}
.tab-btn{padding:10px 20px;cursor:pointer;font-size:14px;font-weight:400;color:var(--text-3);border-bottom:2px solid transparent;font-family:'Noto Sans TC',sans-serif}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:var(--text);font-weight:500;border-bottom-color:var(--active);background:var(--bg)}
#main{flex:1;display:grid;grid-template-columns:200px 1fr;overflow:hidden}
#sidebar{background:var(--sidebar);border-right:1px solid var(--border);overflow-y:auto;padding:8px 0}
.sb-item{padding:10px 14px;cursor:pointer;font-size:15px;font-weight:400;color:var(--text-2);border-left:3px solid transparent;transition:all 0.1s}
.sb-item:hover{background:var(--hover)}
.sb-item.active{background:white;border-left-color:var(--active);font-weight:500;color:var(--text)}
.sb-cat{font-size:13px;font-weight:400;letter-spacing:2px;color:var(--text-3);padding:12px 14px 4px}
.sb-count{font-size:11px;color:var(--text-3);margin-left:4px}
#editor{overflow-y:auto;padding:20px}
.section-block{margin-bottom:16px;background:white;border-radius:8px;border:1px solid var(--border);overflow:hidden}
.section-hdr{padding:10px 14px;background:var(--bg);border-bottom:1px solid var(--border);font-weight:400;font-size:16px;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.section-hdr:hover{background:var(--hover)}
.section-body{padding:12px 14px;display:none}
.section-body.open{display:block}
.q-row{display:flex;align-items:center;gap:8px;padding:8px 10px;border-bottom:1px solid rgba(0,0,0,0.05);font-size:14px}
.q-row:hover{background:var(--hover)}
.q-id{font-weight:400;color:var(--static);min-width:42px}
.q-text{flex:1;color:var(--text-2)}
.q-paired{font-size:10px;padding:1px 5px;border-radius:3px;background:var(--dynamic);color:white;font-weight:400}
.q-opts{font-size:11px;color:var(--text-3)}
.q-actions{display:flex;gap:8px;opacity:0.6}
.q-row:hover .q-actions{opacity:1}
.q-actions button{font-size:12px;padding:3px 8px;border:1px solid var(--border);border-radius:3px;background:white;cursor:pointer;font-family:'Noto Sans TC',sans-serif}
.q-actions button:hover{background:var(--hover)}
.q-actions .del{color:var(--active);border-color:var(--active);background:#fff5f5;margin-left:8px}
.q-dims{display:flex;gap:3px;flex-wrap:wrap;margin-left:4px}
.q-dim-tag{font-size:10px;padding:1px 5px;border-radius:3px;font-weight:400;color:white;white-space:nowrap}
.edit-form{background:#faf8f5;border:1px solid var(--border);border-radius:6px;padding:12px;margin:6px 0}
.edit-form .row{display:flex;gap:6px;align-items:center;margin:4px 0;flex-wrap:wrap}
.edit-form label{font-size:13px;color:var(--text-3);min-width:50px}
.edit-form input,.edit-form select{font-size:14px;padding:3px 6px;border:1px solid var(--border);border-radius:4px;font-family:'Noto Sans TC',sans-serif}
.edit-form input[type=text]{flex:1;min-width:150px}
.opt-row{display:flex;gap:4px;align-items:center;margin:2px 0 2px 56px}
.opt-row input{font-size:12px;padding:2px 4px}
.opt-row button{font-size:11px;padding:1px 5px;border:1px solid var(--border);border-radius:3px;background:white;cursor:pointer}
.add-btn{font-size:12px;padding:3px 10px;border:1px dashed var(--border);border-radius:4px;background:transparent;cursor:pointer;color:var(--text-3);margin:6px 0;font-family:'Noto Sans TC',sans-serif}
.add-btn:hover{background:var(--hover);border-color:var(--text-3)}
/* Rule editor nodes */
.node{margin:4px 0 4px 16px;padding:8px 12px;border-left:2px solid var(--border);font-size:14px;border-radius:4px;margin-bottom:2px}
.node-op{display:inline-block;padding:1px 8px;border-radius:10px;font-size:12px;font-weight:400;color:white;background:var(--active);margin-right:6px;letter-spacing:1px}
.node-ref{font-weight:400;color:var(--text)}
.node-match{color:var(--static);font-weight:400}
.node-meta{color:var(--text-3);font-size:13px;margin-left:8px}
.node-actions{display:inline-flex;gap:8px;margin-left:8px;opacity:0.6}
.node:hover .node-actions{opacity:1}
.node-actions button{font-size:12px;padding:3px 8px;border:1px solid var(--border);border-radius:3px;background:white;cursor:pointer;font-family:'Noto Sans TC',sans-serif}
.node-actions .del{color:var(--active);border-color:var(--active);background:#fff5f5;margin-left:8px}
.node-veto{border-left-color:var(--active)}
.node-lr{border-left-color:#9E8A5A}
.btn-save.dirty{background:#c03830;animation:pulse-save 1.5s ease-in-out infinite}
.btn-undo{background:var(--sidebar);color:var(--text-2);border:1px solid var(--border)}
.btn-undo:disabled{opacity:0.3;cursor:default}
@keyframes pulse-save{0%,100%{opacity:1}50%{opacity:0.85}}
#breadcrumb{height:28px;padding:0 20px;background:white;border-bottom:1px solid var(--border);font-size:12px;color:var(--text-3);display:flex;align-items:center;line-height:28px}
.toast{position:fixed;top:60px;right:20px;padding:10px 20px;border-radius:6px;color:white;font-size:13px;font-weight:400;font-family:'Noto Sans TC',sans-serif;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:100}
.toast.show{opacity:1}
.toast-ok{background:#4a8a5a}
.toast-err{background:#c03830}
/* ===== Liunian Table ===== */
#liunian-wrap{padding:20px;overflow:auto;height:100%}
.ln-tabs{display:flex;gap:0;margin-bottom:16px}
.ln-tab{padding:8px 20px;cursor:pointer;font-size:14px;font-weight:400;color:var(--text-3);border-bottom:2px solid transparent;font-family:'Noto Sans TC',sans-serif}
.ln-tab:hover{color:var(--text)}
.ln-tab.active{color:var(--text);font-weight:500;border-bottom-color:var(--dynamic)}
.ln-table{border-collapse:separate;border-spacing:0;font-size:13px;width:100%}
.ln-table th{position:sticky;top:0;background:var(--nav);color:white;padding:8px 10px;font-weight:400;text-align:center;letter-spacing:1px;z-index:2;white-space:nowrap}
.ln-table td{padding:6px 8px;text-align:center;border-bottom:1px solid rgba(0,0,0,0.06);white-space:nowrap}
.ln-table tr:hover td{background:var(--hover)}
.ln-table td.mark-cell{font-weight:400;color:var(--active)}
.ln-table td input{width:100%;border:none;border-bottom:1px solid transparent;background:transparent;font-size:13px;font-family:'Noto Sans TC',sans-serif;text-align:center;padding:2px 0;outline:none}
.ln-table td input:focus{border-bottom-color:var(--active);background:#fff8f0}
.ln-table td select{border:none;background:transparent;font-size:13px;font-family:'Noto Sans TC',sans-serif;text-align:center;cursor:pointer;outline:none}
.ln-table td select:focus{background:#fff8f0}
.ln-table td .ln-cell{display:flex;align-items:center;gap:4px;white-space:nowrap}
.ln-table td .ln-cell input{flex:1;min-width:0}
.ln-table td .ln-default{font-size:13px;background:#888;color:#fff;padding:1px 5px;border-radius:3px;white-space:nowrap;user-select:none}
.ln-age{font-weight:400;color:var(--text);min-width:36px}
.ln-mark{min-width:30px}
.ln-guan{background:#fff0e0;color:#c07030;font-weight:400}
.ln-ai{background:#ffe8e8;color:#c03830;font-weight:400}
.ln-row-guan{background:#fffaf0}
.ln-row-ai{background:#fff5f5}
.ln-save-bar{position:sticky;bottom:0;background:var(--bg);border-top:1px solid var(--border);padding:10px 20px;display:flex;gap:12px;align-items:center;z-index:3}
.ln-save-bar button{height:36px;padding:0 20px;border:none;border-radius:6px;font-size:14px;font-weight:400;cursor:pointer;font-family:'Noto Sans TC',sans-serif;letter-spacing:1px}
.ln-save-bar .ln-btn-save{background:var(--static);color:white}
.ln-save-bar .ln-btn-reset{background:#eee;color:var(--text)}
.ln-dirty{color:var(--active);font-weight:400;font-size:13px}
</style>
</head>
<body>
<div id="top-bar">
  <span>風鑑學堂 管理介面</span>
  <button class="btn-save" id="btn-save" onclick="saveAll()">儲存到 Firebase</button>
  <button class="btn-undo" id="btn-undo" onclick="undo()" disabled>復原</button>
  <span class="status" id="status">載入中...</span>
</div>
<div id="toast" class="toast"></div>
<div id="tab-bar">
  <div class="tab-btn active" onclick="switchTab('rules')">評分規則</div>
  <div class="tab-btn" onclick="switchTab('questions')">觀察問題</div>
  <div class="tab-btn" onclick="switchTab('liunian')">流年表</div>
  <div style="flex:1"></div>
  <a href="index_desktop.html" target="_blank" style="font-size:12px;color:var(--text-3);text-decoration:none;padding:10px 14px;display:flex;align-items:center">→ 前台預覽</a>
</div>
<div id="breadcrumb"></div>
<div id="liunian-page" style="display:none;flex:1;overflow:hidden;flex-direction:column"></div>
<div id="main">
  <div id="sidebar"></div>
  <div id="editor"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="rules/all_questions.js"></script>
<script>
const firebaseConfig={apiKey:"AIzaSyCZUzTOaCtbzXuX_mz5VoFvZ2Sva1Obza8",authDomain:"renxiangbingfa.firebaseapp.com",projectId:"renxiangbingfa",storageBucket:"renxiangbingfa.firebasestorage.app",messagingSenderId:"912262878667",appId:"1:912262878667:web:cd7a74f1378221dbe3524e"};
firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();
const DIM_COLORS=['#5E8080','#6E9292','#7EA4A4','#527070','#608282','#6E9494','#9E8A5A','#B29E6E','#C6B282','#7A5A50','#8E6C62','#A27E74','#B69088'];
const DIM_NAMES=['形勢','經緯','方圓','曲直','收放','緩急','順逆','分合','真假','攻守','奇正','虛實','進退'];
const PART_ORDER=['頭','上停','耳','眉','眼','鼻','口','顴','人中','地閣','頤','中停','下停'];
const Q_PART_NAMES=['頭','額','耳','眉','眼','鼻','顴','口','人中','地閣','頤'];
const Q_PREFIXES={頭:'h',額:'e',耳:'er',眉:'br',眼:'ey',鼻:'n',顴:'q',口:'m',人中:'p',地閣:'c',頤:'y'};

var activeTab='rules';
var liunianData=null;
var _liunianSnapshot=null;
var _liunianDirty=false;
var rules=[];
var questions={}; // OBS_PARTS_DATA format
var curDim=0;
var curPart=0;
var editingQ=null; // qId being edited
var openSections=new Set(); // track which sections are expanded

function setStatus(m){document.getElementById('status').textContent=m;}

function switchTab(t){
  if(t!=='liunian' && _dirtyCount>0&&!confirm('有 '+_dirtyCount+' 筆修改未儲存，確定要切換嗎？'))return;
  if(t==='liunian' && activeTab!=='liunian' && _dirtyCount>0&&!confirm('有 '+_dirtyCount+' 筆修改未儲存，確定要切換嗎？'))return;
  if(activeTab==='liunian' && t!=='liunian' && _liunianDirty&&!confirm('流年表有未儲存的修改，確定要切換嗎？'))return;
  activeTab=t;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector('.tab-btn[onclick*="'+t+'"]').classList.add('active');
  if(t==='liunian'){
    document.getElementById('main').style.display='none';
    document.getElementById('breadcrumb').style.display='none';
    document.getElementById('liunian-page').style.display='flex';
    renderLiunian();
  }else{
    document.getElementById('main').style.display='grid';
    document.getElementById('breadcrumb').style.display='';
    document.getElementById('liunian-page').style.display='none';
    renderAll();
  }
}

// ==================== SHARED ====================
function renderAll(){
  if(activeTab==='rules')renderRules();
  else if(activeTab==='questions')renderQuestions();
  else if(activeTab==='liunian')renderLiunian();
  updateBreadcrumb();
}

function updateBreadcrumb(){
  var el=document.getElementById('breadcrumb');if(!el)return;
  var sep=' <span style="color:var(--border);margin:0 4px">→</span> ';
  var parts=[];
  if(activeTab==='rules'){
    parts.push('評分規則');
    if(rules[curDim])parts.push(rules[curDim].positive+rules[curDim].negative);
    // Find last open section for this dim
    var lastPart='';
    openSections.forEach(function(k){
      if(k.startsWith('r-'+curDim+'-'))lastPart=k.replace('r-'+curDim+'-','');
    });
    if(lastPart)parts.push(lastPart);
  }else{
    parts.push('觀察問題');
    var pn=Object.keys(questions)[curPart];
    if(pn)parts.push(pn);
  }
  var html=parts.map(function(p,i){
    if(i===parts.length-1)return '<span style="font-weight:400;color:var(--text)">'+p+'</span>';
    return '<span>'+p+'</span>';
  }).join(sep);
  el.innerHTML=html;
}

// Build QMAP from questions for rule editor dropdowns
function buildQmap(){
  var m={};
  Object.keys(questions).forEach(pn=>{
    var pd=questions[pn];if(!pd||!pd.sections)return;
    pd.sections.forEach(s=>s.qs.forEach(q=>{
      m[q.id]={text:q.text,paired:!!q.paired,
        opts:q.opts.map(o=>typeof o==='string'?o:o.v),
        fullOpts:q.opts.map(o=>typeof o==='string'?{v:o,hint:''}:{v:o.v,hint:o.hint||''})
      };
    }));
  });
  return m;
}
function getHintForMatch(qmap,ref,matchVal){
  var q=qmap[ref];if(!q||!q.fullOpts)return '';
  var opt=q.fullOpts.find(o=>o.v===matchVal);
  return opt?opt.hint:'';
}
var OP_CN={'AND':'都符合 AND','OR':'或 OR','COUNT':'計數 COUNT','NOT':'不可有 NOT','LR':'LR','VETO':'VETO','partResult':'引用結果','group':'敘述分組'};
function formatPartResult(pr){var d=pr.indexOf('.');if(d>=0){var p=pr.substring(0,d),s=pr.substring(d+1);return (s==='L'?'左':'右')+p;}return pr;}
function isInsideLR(path){return path.indexOf('.each')!==-1;}
function advancedFieldsHtml(curSide,curWeight){
  var sOpts='<option value=""'+((!curSide||curSide==='')?' selected':'')+'>不分左右</option>';
  sOpts+='<option value="L"'+(curSide==='L'?' selected':'')+'>左</option>';
  sOpts+='<option value="R"'+(curSide==='R'?' selected':'')+'>右</option>';

  var wt=curWeight||1;
  return '<div class="row" id="side-toggle-row"><span style="font-size:12px;color:var(--text-3);cursor:pointer;text-decoration:underline" onclick="document.getElementById(\'advanced-fields\').style.display=\'block\';this.parentElement.style.display=\'none\'">進階設定 ▸</span></div>'
    +'<div id="advanced-fields" style="display:none">'
    +'<div class="row"><label>Side</label><select id="er-side">'+sOpts+'</select></div>'
    +'<div class="row"><label>Weight</label><input type="number" id="er-wt" value="'+wt+'" min="1" style="width:50px"></div>'
    +'</div>';
}
function matchOptsHtml(qmap,ref,selectedArr){
  var qi=qmap[ref]||{fullOpts:[]};
  return (qi.fullOpts||[]).map(function(o){
    var label=o.hint?o.v+' — '+o.hint:o.v;
    return '<option value="'+o.v+'"'+(selectedArr.includes(o.v)?' selected':'')+'>'+label+'</option>';
  }).join('');
}

// ==================== RULES EDITOR ====================
var _addBtnCounter=0;
function renderRules(){
  _addBtnCounter=0;
  var qmap=buildQmap();
  // Sidebar
  var sh='';var catIdx=0;
  var DIM_CATS=[{name:'先天指數',start:0},{name:'運氣指數',start:6},{name:'後天指數',start:9}];
  rules.forEach((d,i)=>{
    if(catIdx<DIM_CATS.length&&i===DIM_CATS[catIdx].start){sh+=`<div class="sb-cat">${DIM_CATS[catIdx].name}</div>`;catIdx++;}
    sh+=`<div class="sb-item${i===curDim?' active':''}" onclick="curDim=${i};renderAll()" style="border-left-color:${i===curDim?DIM_COLORS[i]:'transparent'}"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${DIM_COLORS[i]};margin-right:6px;vertical-align:middle"></span>${DIM_NAMES[i]}</div>`;
  });
  document.getElementById('sidebar').innerHTML=sh;

  var dim=rules[curDim];
  if(!dim){document.getElementById('editor').innerHTML='<div style="padding:20px;color:var(--text-3)">無規則資料</div>';return;}
  var eh=`<div style="display:flex;align-items:center;gap:12px;margin-bottom:4px"><span style="font-size:18px;font-weight:400">${DIM_NAMES[curDim]}</span><button onclick="exportDimStandard(${curDim})" style="height:28px;padding:0 12px;border:1px solid var(--border);border-radius:4px;font-size:12px;font-weight:400;cursor:pointer;background:white;color:var(--text-3)">匯出此維度</button></div>`;
  eh+=`<div style="font-size:13px;color:var(--text-3);margin-bottom:16px">${dim.category||''} · ${dim.positive}（${dim.positiveType}）vs ${dim.negative}（${dim.negativeType}）</div>`;

  PART_ORDER.forEach(pn=>{
    var pd=dim.parts[pn];
    var secKey='r-'+curDim+'-'+pn;
    var isOpen=openSections.has(secKey);
    var leafInfo=pd?countLeafNodes(pd)+'個條件':'無規則';
    eh+=`<div class="section-block"><div class="section-hdr" onclick="toggleSec('${secKey}',this)">${pn} <span style="font-size:12px;color:var(--text-3);font-weight:400;margin-left:6px">${leafInfo}</span> <span style="font-size:12px;color:var(--text-3)">${isOpen?'▲':'▼'}</span></div><div class="section-body${isOpen?' open':''}">`;
    if(pd)eh+=renderNode(pd,'parts.'+pn,0,qmap);
    else eh+='<div style="color:var(--text-3);font-size:13px">此部位無規則</div>';
    eh+=`<button class="add-btn" id="add-btn-root-${pn}" onclick="addRootItem('${pn}')">+ 另起一組條件</button>`;
    eh+='</div></div>';
  });
  document.getElementById('editor').innerHTML=eh;
  // Auto-open edit form for newly added node
  if(_autoEditPath){
    var ap=_autoEditPath;var aqp=_autoEditQPart;_autoEditPath=null;_autoEditQPart=null;
    setTimeout(function(){
      var node=getPath(rules[curDim],ap);if(!node)return;
      var rulePart=getRulePartFromPath(ap);
      var allowedQParts=aqp?[aqp]:(RULE_TO_QPARTS[rulePart]||Q_PART_NAMES);
      var nodes=document.querySelectorAll('.node');
      var targetEl=null;
      nodes.forEach(function(el){var r=el.querySelector('.node-ref');if(r&&r.textContent===node.ref)targetEl=el;});
      if(targetEl){
        var qmap=buildQmap();
        var mv=Array.isArray(node.match)?node.match:[node.match];
        var warnMap=PARTRESULT_WARN[rulePart]||{};
        var warnText=aqp&&warnMap[aqp]?'<div style="font-size:11px;color:#999;margin-bottom:6px">提醒：'+aqp+'通常以 partResult 引用，此處為'+rulePart+'特殊條件</div>':'';
        var h='<div class="edit-form"><div style="font-size:12px;font-weight:400;color:var(--text-3);margin-bottom:8px">編輯新條件</div>'+warnText;
        h+='<div class="row"><label>題目</label><select id="er-ref" onchange="erUpdateMatch()">'+buildRefSelectFiltered(node.ref,allowedQParts,node.ref)+'</select></div>';
        h+='<div class="row"><label>選項</label><select id="er-match" multiple size="4">'+matchOptsHtml(qmap,node.ref,mv)+'</select></div>';
        h+=advancedFieldsHtml(node.side,1);
        h+='<div style="margin-top:8px;display:flex;gap:6px"><button onclick="saveRuleEdit(\''+ap+'\')" style="padding:4px 12px;background:var(--static);color:white;border:none;border-radius:4px;cursor:pointer">確定</button><button onclick="cancelNewNode()" style="padding:4px 12px;border:1px solid var(--border);border-radius:4px;cursor:pointer">取消</button></div></div>';
        var d=document.createElement('div');d.className='dynamic-edit-form';d.innerHTML=h;targetEl.after(d);
        targetEl.scrollIntoView({behavior:'smooth',block:'center'});
      }
    },50);
  }
}

function depthStyle(d){
  var bgs=['','rgba(0,0,0,0.03)','rgba(0,0,0,0.06)','rgba(0,0,0,0.09)'];
  var borders=['','#c4b99a','#a89878','#8c7d5e'];
  var l=Math.min(d,3);var s='';
  if(l>0)s+='background:'+bgs[l]+';border-left-color:'+borders[l]+';';
  return s;
}

function renderNode(node,path,depth,qmap,parentOp){
  if(!node)return '';
  var h='',ind=depth*8,bg=depthStyle(depth);
  var canWrap=parentOp==='COUNT'||parentOp==='AND'||parentOp==='OR';
  if(node.partResult!==undefined){
    return `<div class="node" style="margin-left:${ind}px;${bg}"><span class="node-op" style="background:var(--text-3)">引用結果</span><span class="node-ref" style="margin-left:4px">→ ${formatPartResult(node.partResult)}</span>${nodeActs(path,canWrap)}</div>`;
  }
  if(node.group!==undefined){
    h+=`<div class="node" style="margin-left:${ind}px;${bg}"><span class="node-op" style="background:#6B8E6B">敘述分組</span><span style="margin-left:6px;color:var(--text-2);font-style:italic">${node.group||'（未填敘述）'}</span>`;
    h+=nodeActs(path,canWrap);
    h+=`<div class="edit-placeholder" data-path="${path}"></div>`;
    if(node.items)node.items.forEach((it,ii)=>{h+=renderNode(it,path+'.items.'+ii,depth+1,qmap,'GROUP');});
    _addBtnCounter++;
    h+=`<button class="add-btn" id="add-btn-${_addBtnCounter}" onclick="addRuleItem('${path}','add-btn-${_addBtnCounter}')">+ 新增條件</button></div>`;
    return h;
  }
  if(node.ref!==undefined){
    var q=(qmap||{})[node.ref]||{text:'?',fullOpts:[]};
    var sidePrefix=node.side==='L'?'左':node.side==='R'?'右':'';
    var matchArr=Array.isArray(node.match)?node.match:[node.match];
    var msHtml=matchArr.map(function(mv){
      var hint=getHintForMatch(qmap,node.ref,mv);
      if(hint){return '<span title="'+hint.replace(/"/g,'&quot;')+'" style="cursor:help;border-bottom:1px dotted var(--static)">'+mv+'</span><span style="font-size:13px;color:var(--text-3);cursor:help" title="'+hint.replace(/"/g,'&quot;')+'"> ⓘ '+hint+'</span>';}
      return mv;
    }).join('｜');
    h+=`<div class="node" style="margin-left:${ind}px;${bg}"><span class="node-ref">${node.ref}</span> <span style="color:var(--text-2)">${sidePrefix}${q.text}</span> = <span class="node-match">${msHtml}</span>`;
    if(node.weight>1)h+=`<span class="node-meta">×${node.weight}</span>`;
    h+=nodeActs(path,canWrap)+'</div>';return h;
  }
  if(node.veto){
    h+=`<div class="node node-veto" style="margin-left:${ind}px;${bg}"><span class="node-op">VETO</span>${nodeActs(path,false)}<div class="edit-placeholder" data-path="${path}"></div>`;
    node.veto.forEach((v,vi)=>{h+=`<div style="margin-left:16px;font-size:12px;color:var(--text-3)">觸發→${v.result}</div>`+renderNode(v.condition,path+'.veto.'+vi+'.condition',depth+1,qmap,'VETO');});
    if(node.rule)h+='<div style="margin-left:16px;font-size:12px;color:var(--text-3)">正常規則：</div>'+renderNode(node.rule,path+'.rule',depth+1,qmap,null);
    return h+'</div>';
  }
  if(node.rule&&!node.veto)return renderNode(node.rule,path+'.rule',depth,qmap,parentOp);
  var op=node.op;
  if(op==='AND'||op==='OR'||op==='COUNT'){
    h+=`<div class="node" style="margin-left:${ind}px;${bg}"><span class="node-op">${OP_CN[op]||op}</span>`;
    if(op==='COUNT')h+=`<span class="node-op" style="background:#d4564e">${'最少'+node.min+'項 min='+node.min}</span>`;
    h+=nodeActs(path,canWrap);
    h+=`<div class="edit-placeholder" data-path="${path}"></div>`;
    if(node.items)node.items.forEach((it,ii)=>{h+=renderNode(it,path+'.items.'+ii,depth+1,qmap,op);});
    _addBtnCounter++;
    h+=`<button class="add-btn" id="add-btn-${_addBtnCounter}" onclick="addRuleItem('${path}','add-btn-${_addBtnCounter}')">+ 新增條件</button></div>`;return h;
  }
  if(op==='LR'){
    var mergeLabel=node.merge==='all'?'都符合':'一邊符合即可';
    h+=`<div class="node node-lr" style="margin-left:${ind}px;${bg}"><span class="node-op" style="background:#9E8A5A">左右部位 LR</span><span class="node-op" style="background:#b5a078">${mergeLabel}</span>${nodeActs(path,canWrap)}<div class="edit-placeholder" data-path="${path}"></div>`;
    h+=renderNode(node.each,path+'.each',depth+1,qmap,'LR');
    _addBtnCounter++;
    h+=`<button class="add-btn" id="add-btn-${_addBtnCounter}" onclick="addLrEachItem('${path}','add-btn-${_addBtnCounter}')">+ 新增條件</button>`;
    return h+'</div>';
  }
  if(op==='NOT'){
    h+=`<div class="node" style="margin-left:${ind}px;${bg}"><span class="node-op" style="background:#8B5CF6">${OP_CN.NOT}</span>${nodeActs(path,canWrap)}<div class="edit-placeholder" data-path="${path}"></div>`;
    if(node.item)h+=renderNode(node.item,path+'.item',depth+1,qmap,'NOT');
    return h+'</div>';
  }
  return `<div class="node" style="margin-left:${ind}px;${bg};color:var(--text-3)">[${JSON.stringify(node).substring(0,60)}...]</div>`;
}

function nodeActs(p,showWrap){
  var h='<span class="node-actions"><button onclick="editRuleNode(\''+p+'\')">編輯</button><button class="del" onclick="deleteRuleNode(\''+p+'\')">刪除</button>';
  if(showWrap)h+='<button onclick="wrapInGroup(\''+p+'\')" style="color:#6B8E6B">包入分組</button>';
  h+='</span>';
  return h;
}

// Rule part → allowed question parts mapping
var RULE_TO_QPARTS={
  '頭':['頭'],'上停':['額'],'耳':['耳'],'眉':['眉'],'眼':['眼'],'鼻':['鼻'],'口':['口'],
  '顴':['顴'],'人中':['人中'],'地閣':['地閣'],'頤':['頤'],
  '中停':['眉','眼','鼻','顴'],'下停':['口','人中','地閣','頤']
};
var PARTRESULT_WARN={'中停':{'眉':true,'眼':true,'鼻':true,'顴':true},'下停':{'口':true,'人中':true,'地閣':true,'頤':true}};

// Build ref <select> filtered by allowed question parts, grouped by section
function buildRefSelectFiltered(selected,allowedQParts,currentRef){
  var src=Object.keys(questions).length>0?questions:(typeof ALL_QUESTIONS_DEFAULT!=='undefined'?ALL_QUESTIONS_DEFAULT:{});
  var h='<option value="">選擇題目</option>';
  var foundCurrent=false;
  (allowedQParts||Q_PART_NAMES).forEach(pn=>{
    var pd=src[pn];if(!pd||!pd.sections)return;
    pd.sections.forEach(sec=>{
      h+=`<optgroup label="${pn} — ${sec.label}">`;
      sec.qs.forEach(q=>{
        if(q.id===currentRef)foundCurrent=true;
        h+=`<option value="${q.id}"${q.id===selected?' selected':''}>${q.id} ${q.text}</option>`;
      });
      h+='</optgroup>';
    });
  });
  // If currentRef exists but wasn't in allowed parts, add it under "其他"
  if(currentRef&&!foundCurrent){
    var qmap=buildQmap();var qi=qmap[currentRef];
    if(qi)h+=`<optgroup label="其他"><option value="${currentRef}" selected>${currentRef} ${qi.text}</option></optgroup>`;
  }
  return h;
}

// Get rule part name from path
function getRulePartFromPath(path){return path.split('.')[1]||'';}

// Get first ref for a question part
function getFirstRef(qPartName){
  var src=Object.keys(questions).length>0?questions:(typeof ALL_QUESTIONS_DEFAULT!=='undefined'?ALL_QUESTIONS_DEFAULT:{});
  var pd=src[qPartName];
  if(pd&&pd.sections&&pd.sections[0]&&pd.sections[0].qs&&pd.sections[0].qs[0])return pd.sections[0].qs[0].id;
  return 'h1';
}

function clearDynamicForms(){document.querySelectorAll('.dynamic-edit-form').forEach(function(el){el.remove();});}

function getPath(obj,p){var c=obj;p.split('.').forEach(k=>{if(c==null)return;c=/^\d+$/.test(k)?c[+k]:c[k];});return c;}
function delPath(obj,p){var ps=p.split('.'),c=obj;for(var i=0;i<ps.length-1;i++)c=/^\d+$/.test(ps[i])?c[+ps[i]]:c[ps[i]];var l=ps[ps.length-1];Array.isArray(c)&&/^\d+$/.test(l)?c.splice(+l,1):delete c[l];}

function editRuleNode(path){
  clearDynamicForms();
  var node=getPath(rules[curDim],path);if(!node)return;
  var qmap=buildQmap();

    html+='<div class="row"><label>題目</label><select id="er-ref" onchange="erUpdateMatch()">'+buildRefSelectFiltered(node.ref,allowedQParts,node.ref)+'</select></div>';
    var mv=Array.isArray(node.match)?node.match:[node.match];
    html+='<div class="row"><label>選項</label><select id="er-match" multiple size="4">'+matchOptsHtml(qmap,node.ref,mv)+'</select></div>';
    html+=advancedFieldsHtml(node.side,node.weight||1);
  }else if(node.op==='AND'||node.op==='OR'||node.op==='COUNT'){
    html+='<div class="row"><label>類型</label><select id="er-optype"><option value="AND"'+(node.op==='AND'?' selected':'')+'>AND</option><option value="OR"'+(node.op==='OR'?' selected':'')+'>OR</option><option value="COUNT"'+(node.op==='COUNT'?' selected':'')+'>COUNT</option></select></div>';
    if(node.op==='COUNT')html+='<div class="row"><label>min</label><input type="number" id="er-min" value="'+node.min+'" min="0" style="width:50px"></div>';
  }else if(node.op==='LR'){
    html+='<div class="row"><label>merge</label><select id="er-merge"><option value="any"'+(node.merge==='any'?' selected':'')+'>一邊符合即可</option><option value="all"'+(node.merge==='all'?' selected':'')+'>都符合</option></select></div>';
  }else if(node.op==='NOT'){
    if(node.item&&node.item.ref!==undefined){
      html+='<div class="row"><label>題目</label><select id="er-ref" onchange="erUpdateMatch()">'+buildRefSelectFiltered(node.item.ref,allowedQParts,node.item.ref)+'</select></div>';
      var nmv=Array.isArray(node.item.match)?node.item.match:[node.item.match];
      html+='<div class="row"><label>選項</label><select id="er-match" multiple size="4">'+matchOptsHtml(qmap,node.item.ref,nmv)+'</select></div>';
      html+=advancedFieldsHtml(node.item.side,1);
    }
  }else if(node.partResult!==undefined){
    var prOpts='';
    var prSides=[
      {v:'頭',label:'頭'},{v:'上停',label:'上停'},
      {v:'耳',label:'耳'},
      {v:'眉',label:'眉（整體）'},{v:'眉.L',label:'左眉'},{v:'眉.R',label:'右眉'},
      {v:'眼',label:'眼（整體）'},{v:'眼.L',label:'左眼'},{v:'眼.R',label:'右眼'},
      {v:'鼻',label:'鼻'},{v:'口',label:'口'},
      {v:'顴',label:'顴（整體）'},{v:'顴.L',label:'左顴'},{v:'顴.R',label:'右顴'},
      {v:'人中',label:'人中'},{v:'地閣',label:'地閣'},
      {v:'頤',label:'頤（整體）'},{v:'頤.L',label:'左頤'},{v:'頤.R',label:'右頤'},
      {v:'中停',label:'中停'},{v:'下停',label:'下停'}
    ];
    prSides.forEach(function(pr){
      prOpts+='<option value="'+pr.v+'"'+(node.partResult===pr.v?' selected':'')+'>'+pr.label+'</option>';
    });
    html+='<div class="row"><label>引用部位</label><select id="er-pr">'+prOpts+'</select></div>';
  }else if(node.group!==undefined){
    html+='<div class="row"><label>敘述</label><input type="text" id="er-group" value="'+(node.group||'').replace(/"/g,'&quot;')+'" style="width:240px" placeholder="輸入分組敘述文字"></div>';
  }
  html+='<div style="margin-top:8px;display:flex;gap:6px"><button onclick="saveRuleEdit(\''+path+'\')" style="padding:4px 12px;background:var(--static);color:white;border:none;border-radius:4px;cursor:pointer">確定</button><button onclick="renderAll()" style="padding:4px 12px;border:1px solid var(--border);border-radius:4px;cursor:pointer">取消</button></div></div>';
  // For operator nodes, insert into placeholder; for leaf nodes, insert after
  var ph=document.querySelector('.edit-placeholder[data-path="'+path+'"]');
  if(ph){ph.innerHTML=html;}
  else{var el=event.target.closest('.node');if(el){var d=document.createElement('div');d.className='dynamic-edit-form';d.innerHTML=html;el.after(d);}}
}
function erUpdateMatch(){
  var qmap=buildQmap();var ref=document.getElementById('er-ref').value;var sel=document.getElementById('er-match');
  sel.innerHTML=matchOptsHtml(qmap,ref,[]);
}
function saveRuleEdit(path){
  if(_pendingNewNodePath!==path){pushUndo();}
  var n=getPath(rules[curDim],path);if(!n)return;
  if(n.ref!==undefined){n.ref=document.getElementById('er-ref').value;var s=document.getElementById('er-match');var v=[...s.selectedOptions].map(o=>o.value);n.match=v.length===1?v[0]:v;var sd=document.getElementById('er-side').value;if(sd==='L'||sd==='R')n.side=sd;else delete n.side;var w=+document.getElementById('er-wt').value||1;if(w>1)n.weight=w;else delete n.weight;}
  else if(n.op==='AND'||n.op==='OR'||n.op==='COUNT'){
    var newOp=document.getElementById('er-optype');
    if(newOp){
      var nt=newOp.value;
      if(nt==='COUNT'&&n.op!=='COUNT')n.min=1;
      if(nt!=='COUNT')delete n.min;
      n.op=nt;
    }
    var minEl=document.getElementById('er-min');
    if(minEl&&n.op==='COUNT')n.min=+minEl.value||0;
  }
  else if(n.op==='LR')n.merge=document.getElementById('er-merge').value;
  else if(n.op==='NOT'&&n.item){
    var re=document.getElementById('er-ref');if(re)n.item.ref=re.value;
    var me=document.getElementById('er-match');if(me){var mv=[...me.selectedOptions].map(o=>o.value);n.item.match=mv.length===1?mv[0]:mv;}
    var se=document.getElementById('er-side');if(se){var sv=se.value;if(sv==='L'||sv==='R')n.item.side=sv;else delete n.item.side;}
  }
  else if(n.partResult!==undefined)n.partResult=document.getElementById('er-pr').value;
  else if(n.group!==undefined){var ge=document.getElementById('er-group');if(ge)n.group=ge.value;}
  var pn=path.split('.')[1];if(pn)openSections.add('r-'+curDim+'-'+pn);
  if(_pendingNewNodePath===path)_pendingNewNodePath=null;
  renderAll();markDirty();
}
function deleteRuleNode(p){
  var node=getPath(rules[curDim],p);if(!node)return;
  var lc=countLeafNodes(node);
  var msg=lc>1?'此節點包含 '+lc+' 個條件，刪除後將全部移除。\n確定刪除？':'確定刪除？';
  if(!confirm(msg))return;
  pushUndo();delPath(rules[curDim],p);
  // Clean up empty NOT shell: if deleted path ends with .item, remove parent NOT too
  var pp=p.split('.');
  if(pp[pp.length-1]==='item'){var parentPath=pp.slice(0,-1).join('.');delPath(rules[curDim],parentPath);}
  var pn=p.split('.')[1];if(pn)openSections.add('r-'+curDim+'-'+pn);renderAll();markDirty();
}
function wrapInGroup(path){
  var pp=path.split('.');
  var lastKey=pp[pp.length-1];
  var parentPath=pp.slice(0,-1).join('.');
  var parent=getPath(rules[curDim],parentPath);
  if(!parent||!Array.isArray(parent))return;
  var itemIdx=+lastKey;
  var node=parent[itemIdx];
  if(!node)return;

  var existingGroups=[];
  parent.forEach(function(it,i){
    if(i!==itemIdx && it.group!==undefined){
      existingGroups.push({index:i, label:it.group});
    }
  });

  if(existingGroups.length===0){
    var desc=prompt('輸入新分組敘述文字：');
    if(desc===null)return;
    pushUndo();
    parent[itemIdx]={group:desc,items:[node]};
    var pn=path.split('.')[1];if(pn)openSections.add('r-'+curDim+'-'+pn);
    renderAll();markDirty();
    return;
  }

  clearDynamicForms();
  var bs='padding:6px 12px;border:1px solid var(--border);border-radius:4px;background:white;cursor:pointer;font-family:\'Noto Sans TC\',sans-serif;font-size:13px;font-weight:400';
  var h='<div class="edit-form" id="wrap-group-form"><div style="font-size:12px;font-weight:400;color:var(--text-3);margin-bottom:8px">包入分組</div>';
  h+='<div style="display:flex;flex-direction:column;gap:6px">';
  existingGroups.forEach(function(g){
    h+='<button onclick="wrapIntoExistingGroup(\''+path+'\','+g.index+')" style="'+bs+';text-align:left">→ '+g.label+'</button>';
  });
  h+='<button onclick="wrapIntoNewGroup(\''+path+'\')" style="'+bs+';text-align:left;color:#6B8E6B">+ 建立新分組</button>';
  h+='</div>';
  h+='<div style="margin-top:6px"><button onclick="clearDynamicForms()" style="padding:3px 10px;border:1px solid var(--border);border-radius:4px;cursor:pointer;font-size:12px">取消</button></div></div>';

  var targetEl=event.target.closest('.node');
  if(targetEl){var d=document.createElement('div');d.className='dynamic-edit-form';d.innerHTML=h;targetEl.after(d);}
}

function wrapIntoExistingGroup(path,groupIdx){
  clearDynamicForms();
  var pp=path.split('.');
  var lastKey=pp[pp.length-1];
  var parentPath=pp.slice(0,-1).join('.');
  var parent=getPath(rules[curDim],parentPath);
  if(!parent||!Array.isArray(parent))return;
  var itemIdx=+lastKey;
  var node=parent[itemIdx];
  if(!node)return;

  pushUndo();
  var targetGroup=parent[groupIdx];
  if(!targetGroup||targetGroup.group===undefined)return;
  targetGroup.items.push(node);
  parent.splice(itemIdx,1);

  var pn=path.split('.')[1];if(pn)openSections.add('r-'+curDim+'-'+pn);
  renderAll();markDirty();
}

function wrapIntoNewGroup(path){
  clearDynamicForms();
  var desc=prompt('輸入新分組敘述文字：');
  if(desc===null)return;
  var pp=path.split('.');
  var lastKey=pp[pp.length-1];
  var parentPath=pp.slice(0,-1).join('.');
  var parent=getPath(rules[curDim],parentPath);
  if(!parent||!Array.isArray(parent))return;
  var itemIdx=+lastKey;
  var node=parent[itemIdx];
  if(!node)return;

  pushUndo();
  parent[itemIdx]={group:desc,items:[node]};
  var pn=path.split('.')[1];if(pn)openSections.add('r-'+curDim+'-'+pn);
  renderAll();markDirty();
}
var _autoEditPath=null;
var _autoEditQPart=null; // for multi-part selection (中停/下停)

  h+='<button onclick="addNodeOfType(\'COUNT\')" style="'+bs+'">COUNT</button>';

function addNodeOfType(type){
  var form=document.getElementById('type-select-form');if(form)form.remove();
  var p=_pendingAddPath;if(!p)return;_pendingAddPath=null;
  var n=getPath(rules[curDim],p);if(!n||!n.items)return;

  if(type==='ref'){
    var rulePart=getRulePartFromPath(p);
    var allowedQParts=RULE_TO_QPARTS[rulePart]||['頭'];
    _pendingAddPath=p;
    if(allowedQParts.length>1){
      var btns=allowedQParts.map(qp=>`<button onclick="finishAddWithPart('${qp}')" style="padding:6px 14px;border:1px solid var(--border);border-radius:4px;background:white;cursor:pointer;font-family:'Noto Sans TC',sans-serif;font-size:13px;font-weight:400">${qp}</button>`).join(' ');
      var container='<div class="edit-form" id="part-select-form"><div style="font-size:12px;font-weight:400;color:var(--text-3);margin-bottom:8px">選擇觀察部位</div><div style="display:flex;gap:8px;flex-wrap:wrap">'+btns+'</div><div style="margin-top:6px"><button onclick="document.getElementById(\'part-select-form\').remove();_pendingAddPath=null" style="padding:3px 10px;border:1px solid var(--border);border-radius:4px;cursor:pointer;font-size:12px">取消</button></div></div>';
      var btn=document.getElementById(_lastAddBtnId);
      if(btn){var d=document.createElement('div');d.className='dynamic-edit-form';d.innerHTML=container;btn.after(d);}
    }else{
      doAddItem(p,allowedQParts[0]);
    }
    return;
  }

  // Operator nodes
  pushUndo();
  var partName=p.split('.')[1];if(partName)openSections.add('r-'+curDim+'-'+partName);
  if(type==='AND'){n.items.push({op:'AND',items:[]});}
  else if(type==='OR'){n.items.push({op:'OR',items:[]});}
  else if(type==='COUNT'){n.items.push({op:'COUNT',min:1,items:[]});}
  else if(type==='NOT'){
    var rp=getRulePartFromPath(p);var aqp=RULE_TO_QPARTS[rp]||Q_PART_NAMES;
    var dr=getFirstRef(aqp[0]);var qm=buildQmap();var dm=(qm[dr]||{opts:['']}).opts[0];
    var ni={ref:dr,match:dm};
    n.items.push({op:'NOT',item:ni});
  }
  else if(type==='LR'){
    var rp=getRulePartFromPath(p);var aqp=RULE_TO_QPARTS[rp]||Q_PART_NAMES;
    var dr=getFirstRef(aqp[0]);var qm=buildQmap();var dm=(qm[dr]||{opts:['']}).opts[0];
    n.items.push({op:'LR',merge:'all',each:{ref:dr,match:dm}});
  }
  else if(type==='group'){n.items.push({group:'',items:[]});}
  else if(type==='partResult'){n.items.push({partResult:'鼻'});}
  markDirty();renderAll();
}

  else if(type==='OR')rules[curDim].parts[partName]={op:'OR',items:[]};
  else if(type==='NOT'){
    var aqp2=RULE_TO_QPARTS[partName]||Q_PART_NAMES;var dr2=getFirstRef(aqp2[0]);

    rules[curDim].parts[partName]={op:'NOT',item:{ref:dr2,match:dm2}};
  }
  else if(type==='LR'){
    var aqpL=RULE_TO_QPARTS[partName]||Q_PART_NAMES;var drL=getFirstRef(aqpL[0]);

function buildRefDimMap(){
  var map={};
  function scan(node,dimIdx){
    if(!node)return;
    if(node.ref!==undefined){
      var rid=node.ref;
      if(!map[rid])map[rid]=new Set();
      map[rid].add(dimIdx);
    }
    if(node.items){node.items.forEach(function(it){scan(it,dimIdx);});}
    if(node.each)scan(node.each,dimIdx);
    if(node.rule)scan(node.rule,dimIdx);
    if(node.item)scan(node.item,dimIdx);
    if(node.veto){node.veto.forEach(function(v){if(v.condition)scan(v.condition,dimIdx);});}
  }
  if(!rules||!rules.length)return map;
  rules.forEach(function(dim,di){
    if(!dim.parts)return;
    Object.keys(dim.parts).forEach(function(pk){
      scan(dim.parts[pk],di);
    });
  });
  return map;
}

function deleteQ(si,qi){
  var pn=Object.keys(questions)[curPart];
  var q=questions[pn].sections[si].qs[qi];
  // Check rule references
  var rulesStr=JSON.stringify(rules);
  var refs=[];
  rules.forEach((dim,di)=>{
    Object.keys(dim.parts||{}).forEach(partName=>{
      var ps=JSON.stringify(dim.parts[partName]);
      if(ps.includes('"'+q.id+'"'))refs.push(dim.positive+dim.negative+'→'+partName);
    });
  });
  if(refs.length>0){
    alert('以下規則引用了 '+q.id+'：\n'+refs.join('\n')+'\n\n請先到規則編輯器移除這些引用');
    return;
  }
  if(!confirm('確定刪除 '+q.id+' '+q.text+'？'))return;
  pushUndo();
  questions[pn].sections[si].qs.splice(qi,1);
  var total=0;questions[pn].sections.forEach(s=>total+=s.qs.length);
  questions[pn].total=total;
  renderAll();markDirty();
}

function addQ(si){
  var pn=Object.keys(questions)[curPart];
  var prefix=Q_PREFIXES[pn]||'x';
  // Find max ID number for this prefix
  var maxN=0;
  questions[pn].sections.forEach(s=>s.qs.forEach(q=>{
    var m=q.id.match(new RegExp('^'+prefix+'(\\d+)$'));
    if(m)maxN=Math.max(maxN,+m[1]);
  }));
  var newId=prefix+(maxN+1);
  var newQ={id:newId,text:'新題目',opts:[{v:'選項A',hint:''},{v:'選項B',hint:''}]};
  pushUndo();
  questions[pn].sections[si].qs.push(newQ);
  questions[pn].total=(questions[pn].total||0)+1;
  editingQ=newId;
  renderAll();markDirty();
}

// ==================== FIREBASE ====================
// ==================== DIRTY TRACKING + UNDO + SAVE ====================
var _dirtyCount=0;
var _undoStack=[];
var _maxUndo=30;
var _cleanRulesJson='';
var _cleanQuestionsJson='';

function pushUndo(){
  _undoStack.push({rules:JSON.parse(JSON.stringify(rules)),questions:JSON.parse(JSON.stringify(questions))});
  if(_undoStack.length>_maxUndo)_undoStack.shift();
  updateUndoBtn();
}
function undo(){
  if(_undoStack.length===0){showToast('沒有可復原的操作',false);return;}
  var snap=_undoStack.pop();
  // Replace array/object contents in-place (preserve references)
  rules.length=0;
  snap.rules.forEach(function(r){rules.push(r);});
  Object.keys(questions).forEach(function(k){delete questions[k];});
  Object.keys(snap.questions).forEach(function(k){questions[k]=snap.questions[k];});
  // Clear all editing state
  editingQ=null;
  _autoEditPath=null;
  _autoEditQPart=null;
  _pendingNewNodePath=null;
  // Check if undo'd back to clean state
  if(_undoStack.length===0&&JSON.stringify(rules)===_cleanRulesJson&&JSON.stringify(questions)===_cleanQuestionsJson){
    takeSnapshot();
  }else{
    _dirtyCount=Math.max(1,_dirtyCount-1);
    updateSaveBtn();
  }
  // Force full re-render
  document.getElementById('editor').innerHTML='';
  document.getElementById('sidebar').innerHTML='';
  renderAll();
  showToast('已復原',true);
  updateUndoBtn();
}
function updateUndoBtn(){
  var btn=document.getElementById('btn-undo');if(!btn)return;
  btn.disabled=(_undoStack.length===0);
}
function markDirty(){
  _dirtyCount++;
  updateSaveBtn();
  setStatus(_dirtyCount+'筆修改未儲存');
}
function takeSnapshot(){
  _dirtyCount=0;
  _undoStack=[];
  _cleanRulesJson=JSON.stringify(rules);
  _cleanQuestionsJson=JSON.stringify(questions);
  updateSaveBtn();
  updateUndoBtn();
}
function updateSaveBtn(){
  var btn=document.getElementById('btn-save');if(!btn)return;
  if(_dirtyCount>0){
    btn.classList.add('dirty');
    btn.textContent='儲存（'+_dirtyCount+'筆修改）';
  }else{
    btn.classList.remove('dirty');
    btn.textContent='儲存到 Firebase';
  }
}
function showToast(msg,isOk){
  var t=document.getElementById('toast');if(!t)return;
  t.textContent=msg;
  t.className='toast show '+(isOk?'toast-ok':'toast-err');
  setTimeout(function(){t.className='toast';},2000);
}
function countLeafNodes(node){
  if(!node)return 0;
  if(node.ref!==undefined)return 1;
  if(node.partResult!==undefined)return 1;
  if(node.group!==undefined){var gc=0;if(node.items)node.items.forEach(function(it){gc+=countLeafNodes(it);});return gc;}
  if(node.rule&&!node.veto)return countLeafNodes(node.rule);
  var c=0;
  if(node.veto){node.veto.forEach(function(v){c+=countLeafNodes(v.condition);});if(node.rule)c+=countLeafNodes(node.rule);}
  if(node.items)node.items.forEach(function(it){c+=countLeafNodes(it);});
  if(node.each)c+=countLeafNodes(node.each);
  return c;
}
function buildQMap(partData){
  var m={};
  if(!partData||!partData.sections)return m;
  partData.sections.forEach(function(s){s.qs.forEach(function(q){m[q.id]=q;});});
  return m;
}
function buildQIdOrder(partData){
  var ids=[];
  if(!partData||!partData.sections)return ids;
  partData.sections.forEach(function(s){s.qs.forEach(function(q){ids.push(q.id);});});
  return ids;
}
function buildDiffSummary(){
  var lines=[];
  // Rules diff
  try{
    var oldRules=JSON.parse(_cleanRulesJson);
    for(var i=0;i<13;i++){
      if(JSON.stringify(rules[i])!==JSON.stringify(oldRules[i])){
        var dimName=(rules[i]||oldRules[i]).positive+(rules[i]||oldRules[i]).negative;
        PART_ORDER.forEach(function(pn){
          var newP=(rules[i]||{parts:{}}).parts[pn]||null;
          var oldP=(oldRules[i]||{parts:{}}).parts[pn]||null;
          if(JSON.stringify(newP)===JSON.stringify(oldP))return;
          var nc=countLeafNodes(newP),oc=countLeafNodes(oldP);
          if(nc!==oc)lines.push('• 規則 '+dimName+' → '+pn+'：條件數 '+oc+' → '+nc);
          else lines.push('• 規則 '+dimName+' → '+pn+'：條件內容已修改');
        });
      }
    }
  }catch(e){lines.push('• 規則：有修改（無法比較細節）');}
  // Questions diff
  try{
    var oldQ=JSON.parse(_cleanQuestionsJson);
    Object.keys(questions).forEach(function(pn){
      if(JSON.stringify(questions[pn])===JSON.stringify(oldQ[pn]))return;
      var newMap=buildQMap(questions[pn]),oldMap=buildQMap(oldQ[pn]||{});
      var newOrder=buildQIdOrder(questions[pn]),oldOrder=buildQIdOrder(oldQ[pn]||{});
      // Section name changes
      var newSecs=(questions[pn].sections||[]),oldSecs=((oldQ[pn]||{}).sections||[]);
      for(var si=0;si<Math.max(newSecs.length,oldSecs.length);si++){
        var ns=newSecs[si],os=oldSecs[si];
        if(ns&&os&&ns.label!==os.label)lines.push('• 觀察問題 → '+pn+' → 分組名稱「'+os.label+'」改為「'+ns.label+'」');
      }
      // New questions
      Object.keys(newMap).forEach(function(qid){
        if(!oldMap[qid])lines.push('• 觀察問題 → '+pn+' → + '+qid+' '+newMap[qid].text);
      });
      // Deleted questions
      Object.keys(oldMap).forEach(function(qid){
        if(!newMap[qid])lines.push('• 觀察問題 → '+pn+' → - '+qid+' '+oldMap[qid].text);
      });
      // Modified questions
      Object.keys(newMap).forEach(function(qid){
        if(!oldMap[qid])return;
        var nq=newMap[qid],oq=oldMap[qid];
        if(JSON.stringify(nq)===JSON.stringify(oq))return;
        if(nq.text!==oq.text)lines.push('• 觀察問題 → '+pn+' → '+qid+' '+oq.text+'：文字從「'+oq.text+'」改為「'+nq.text+'」');
        if(!!nq.paired!==!!oq.paired)lines.push('• 觀察問題 → '+pn+' → '+qid+'：左右題 '+(nq.paired?'開啟':'關閉'));
        var no=nq.opts.length,oo=oq.opts.length;
        if(JSON.stringify(nq.opts)!==JSON.stringify(oq.opts)){
          if(no!==oo)lines.push('• 觀察問題 → '+pn+' → '+qid+' '+nq.text+'：選項變更（原 '+oo+' 項 → 新 '+no+' 項）');
          else lines.push('• 觀察問題 → '+pn+' → '+qid+' '+nq.text+'：選項文字變更');
        }
      });
      // Order changes
      if(newOrder.length===oldOrder.length&&newOrder.join(',')!==oldOrder.join(',')){
        var sameSet=newOrder.slice().sort().join(',')=== oldOrder.slice().sort().join(',');
        if(sameSet)lines.push('• 觀察問題 → '+pn+'：題目順序變更');
      }
    });
    Object.keys(oldQ).forEach(function(pn){
      if(!questions[pn])lines.push('• 觀察問題 → '+pn+' 已刪除');
    });
  }catch(e){lines.push('• 觀察問題：有修改（無法比較細節）');}
  return lines.join('\n');
}
function exportDimStandard(dimIdx){
  var dim=rules[dimIdx];
  if(!dim){alert('規則尚未載入');return;}

  var dimName=DIM_NAMES[dimIdx];

  // 建立題目查詢表
  var qLookup={};
  Object.keys(questions).forEach(function(partName){
    var pd=questions[partName];
    if(!pd||!pd.sections)return;
    pd.sections.forEach(function(sec){
      sec.qs.forEach(function(q){
        qLookup[q.id]={text:q.text, opts:q.opts, part:partName, paired:q.paired||false};
      });
    });
  });

  var md='# '+dimName+' 評分條件\n';
  md+='> 匯出時間：'+new Date().toISOString().substring(0,19)+'\n';
  md+='> 分類：'+dim.category+'\n';
  md+='> A 側：'+dim.positive+'（'+dim.positiveType+'） / B 側：'+dim.negative+'（'+dim.negativeType+'）\n\n';
  md+='---\n\n';

  PART_ORDER.forEach(function(partName){
    var pd=dim.parts[partName];
    if(!pd)return;
    var content=_nodeToMd(pd, 0, qLookup, dim);
    if(!content.trim())return;

    md+='## '+partName+'\n\n';
    md+=content;
    md+='\n';
  });

  var blob=new Blob([md],{type:'text/markdown;charset=utf-8'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;
  a.download=dimName+'_評分條件.md';
  a.click();
  URL.revokeObjectURL(url);
}

function _nodeToMd(node, depth, qLookup, dim){
  if(!node)return '';
  var indent='  '.repeat(depth);
  var md='';

  // partResult 節點（直接引用其他部位的判定結果）
  if(node.partResult!==undefined){
    md+=indent+'- 引用 **'+node.partResult+'** 的判定結果\n';
    return md;
  }

  // 葉節點：有 ref 的條件
  if(node.ref){
    var q=qLookup[node.ref];
    var qText=q?q.text:node.ref;
    var matchArr=Array.isArray(node.match)?node.match:[node.match];
    var matchLabels=[];
    if(q){
      matchArr.forEach(function(m){
        var opt=q.opts.find(function(o){return o.val===m;});
        matchLabels.push(opt?opt.label:m);
      });
    }else{
      matchLabels=matchArr;
    }
    // side 判斷：L/R 是 LR 裡的左右邊標記，不是 A/B
    var side=node.side;
    var sideLabel, sideType;
    if(side==='L'||side==='R'){
      sideLabel=dim.positive;
      sideType=dim.positiveType;
    }else if(side==='B'){
      sideLabel=dim.negative;
      sideType=dim.negativeType;
    }else{
      sideLabel=dim.positive;
      sideType=dim.positiveType;
    }

    var line=indent+'- **'+sideLabel+'（'+sideType+'）**：'+qText+' → '+matchLabels.join(' / ');

    // veto
    if(node.veto&&node.veto.length>0){
      node.veto.forEach(function(v){
        if(v.condition&&v.condition.ref){
          var vq=qLookup[v.condition.ref];
          var vText=vq?vq.text:v.condition.ref;
          var vMatch=Array.isArray(v.condition.match)?v.condition.match:[v.condition.match];
          var vLabels=[];
          if(vq){
            vMatch.forEach(function(vm){
              var vopt=vq.opts.find(function(o){return o.val===vm;});
              vLabels.push(vopt?vopt.label:vm);
            });
          }else{vLabels=vMatch;}
          line+='（排除：'+vText+' = '+vLabels.join('/')+' → '+v.result+'）';
        }
      });
    }
    md=line+'\n';
    return md;
  }

  // 純 veto 節點（沒有 ref 也沒有 op，但有 veto）
  if(node.veto&&!node.op&&!node.ref&&!node.partResult){
    node.veto.forEach(function(v){
      if(v.condition){
        md+=indent+'- ⛔ VETO（'+v.result+'）：\n';
        md+=_nodeToMd(v.condition, depth+1, qLookup, dim);
      }
    });
    if(node.rule)md+=_nodeToMd(node.rule, depth, qLookup, dim);
    return md;
  }

  // rule 包裝節點
  if(node.rule&&!node.op){
    return _nodeToMd(node.rule, depth, qLookup, dim);
  }

  // AND / OR / COUNT 複合節點
  if(node.op==='AND'||node.op==='OR'||node.op==='COUNT'){
    var opLabel=node.op;
    if(node.op==='COUNT')opLabel='至少 '+node.min+' 項符合';
    md+=indent+'- 【'+opLabel+'】\n';
    if(node.items&&Array.isArray(node.items)){
      node.items.forEach(function(item){
        md+=_nodeToMd(item, depth+1, qLookup, dim);
      });
    }
    if(node.each){
      md+=_nodeToMd(node.each, depth+1, qLookup, dim);
    }
    if(node.veto&&node.veto.length>0){
      node.veto.forEach(function(v){
        if(v.condition){
          md+=indent+'  - ⛔ VETO（'+v.result+'）：\n';
          md+=_nodeToMd(v.condition, depth+2, qLookup, dim);
        }
      });
    }
    return md;
  }

  // NOT 節點
  if(node.op==='NOT'){
    md+=indent+'- 【NOT 排除】\n';
    if(node.item)md+=_nodeToMd(node.item, depth+1, qLookup, dim);
    return md;
  }

  // LR 節點
  if(node.op==='LR'){
    var mergeLabel=node.merge==='all'?'左右都要符合':'左右任一符合';
    md+=indent+'- 【LR '+mergeLabel+'】\n';
    if(node.each){
      md+=_nodeToMd(node.each, depth+1, qLookup, dim);
    }
    if(node.items&&Array.isArray(node.items)){
      node.items.forEach(function(item){
        md+=_nodeToMd(item, depth+1, qLookup, dim);
      });
    }
    return md;
  }

  // group / 敘述分組
  if(node.op==='group'){
    if(node.label)md+=indent+'- 【'+node.label+'】\n';
    if(node.items&&Array.isArray(node.items)){
      node.items.forEach(function(item){
        md+=_nodeToMd(item, depth+(node.label?1:0), qLookup, dim);
      });
    }
    return md;
  }

  // each 節點（沒有 op 但有 each）
  if(node.each&&!node.op){
    return _nodeToMd(node.each, depth, qLookup, dim);
  }

  // 未知節點 fallback
  if(node.items&&Array.isArray(node.items)){
    node.items.forEach(function(item){
      md+=_nodeToMd(item, depth, qLookup, dim);
    });
  }

  return md;
}

function saveAll(){
  if(_dirtyCount===0){showToast('沒有需要儲存的修改',true);return;}
  var diff=buildDiffSummary();
  if(diff&&!confirm('即將儲存以下修改：\n\n'+diff+'\n\n確定儲存？'))return;
  // 清理規則裡的 null items
  function cleanNulls(node){
    if(!node)return;
    if(node.items){node.items=node.items.filter(function(it){return it!==null;});node.items.forEach(cleanNulls);}
    if(node.each)cleanNulls(node.each);
    if(node.rule)cleanNulls(node.rule);
    if(node.item)cleanNulls(node.item);
    if(node.veto)node.veto.forEach(function(v){if(v.condition)cleanNulls(v.condition);});
    if(node.parts){Object.keys(node.parts).forEach(function(k){cleanNulls(node.parts[k]);});}
  }
  rules.forEach(function(dim){if(dim.parts){Object.keys(dim.parts).forEach(function(k){cleanNulls(dim.parts[k]);});}});
  var btn=document.getElementById('btn-save');
  btn.disabled=true;btn.style.opacity='0.6';
  setStatus('儲存中...');
  var ts=new Date().toISOString();
  Promise.all([
    db.collection('settings').doc('rules').set({rulesJson:JSON.stringify(rules),updatedAt:ts}),
    db.collection('settings').doc('questions').set({questionsJson:JSON.stringify(questions),updatedAt:ts})
  ]).then(function(){
    takeSnapshot();
    showToast('規則 + 問題已儲存 ✓',true);
    setStatus('已儲存');
  }).catch(function(e){
    showToast('儲存失敗：'+e.message,false);
    setStatus('儲存失敗');
  }).finally(function(){
    btn.disabled=false;btn.style.opacity='1';
  });
}

function renderLiunian(){
  var wrap=document.getElementById('liunian-page');
  if(!wrap)return;
  if(!liunianData){wrap.innerHTML='<div style="padding:40px;color:#aaa;text-align:center">載入中...</div>';return;}

  var cols=['age','mark','name75','area75','jiuzhi','yewu','qinzu','zinv','erbei','wuguan','santing'];
  var colNames=['歲','關/隘','七十五','部位','九執','業務','親族','子女','耳鼻','五官','三停'];
  var rows=liunianData[_lnGender]||[];

  var h='';
  h+='<div style="padding:12px 20px 0;flex-shrink:0"><div class="ln-tabs">';
  h+='<div class="ln-tab'+(_lnGender==='男'?' active':'')+'" onclick="_lnGender=\'男\';renderLiunian()">男</div>';
  h+='<div class="ln-tab'+(_lnGender==='女'?' active':'')+'" onclick="_lnGender=\'女\';renderLiunian()">女</div>';

  h+='<div style="flex:1;overflow:auto;padding:0 20px">';
  h+='<table class="ln-table"><thead><tr>';
  colNames.forEach(function(cn){h+='<th>'+cn+'</th>';});
  h+='</tr></thead><tbody>';

  rows.forEach(function(row,idx){
    var rowClass='';
    if(row.mark==='關')rowClass=' class="ln-row-guan"';
    else if(row.mark==='隘')rowClass=' class="ln-row-ai"';
    h+='<tr'+rowClass+'>';

    cols.forEach(function(col){
      var val=row[col]!=null?row[col]:'';
      if(col==='age'){
        h+='<td class="ln-age">'+val+'</td>';
      }else if(col==='mark'){
        var cls='ln-mark';
        if(val==='關')cls+=' ln-guan';
        else if(val==='隘')cls+=' ln-ai';
        h+='<td class="'+cls+'">';
        h+='<select onchange="lnEdit(\''+_lnGender+'\','+idx+',\'mark\',this.value)">';
        h+='<option value=""'+(val===''?' selected':'')+'></option>';
        h+='<option value="關"'+(val==='關'?' selected':'')+'>關</option>';
        h+='<option value="隘"'+(val==='隘'?' selected':'')+'>隘</option>';
        var defRow2=LIUNIAN_DEFAULT_DATA[_lnGender]&&LIUNIAN_DEFAULT_DATA[_lnGender][idx]?LIUNIAN_DEFAULT_DATA[_lnGender][idx]:{};
        var defMark=defRow2.mark||'';
        var markChanged=(val||'')!==(defMark||'');
        h+='</select>'+(defMark?'<span class="ln-default">'+defMark+'</span>':'')+'</td>';
      }else{
        var defRow=LIUNIAN_DEFAULT_DATA[_lnGender]&&LIUNIAN_DEFAULT_DATA[_lnGender][idx]?LIUNIAN_DEFAULT_DATA[_lnGender][idx]:{};
        var defVal=defRow[col]!=null?defRow[col]:'';
        var isChanged=String(val)!==String(defVal);
        h+='<td><div class="ln-cell"><input value="'+String(val).replace(/"/g,'&quot;')+'" onchange="lnEdit(\''+_lnGender+'\','+idx+',\''+col+'\',this.value)">';
        h+=(defVal?'<span class="ln-default">'+defVal+'</span>':'')+'</div></td>';
      }
    });
    h+='</tr>';
  });
  h+='</tbody></table></div>';

  h+='<div class="ln-save-bar">';
  h+='<button class="ln-btn-save" onclick="saveLiunian()">儲存流年表</button>';
  h+='<button class="ln-btn-reset" onclick="resetLiunian()">還原</button>';
  if(_liunianDirty)h+='<span class="ln-dirty">有未儲存的修改</span>';
  h+='<span style="flex:1"></span>';
  h+='<span style="font-size:12px;color:var(--text-3)">'+_lnGender+' 共 '+rows.length+' 筆</span>';
  h+='</div>';

  wrap.innerHTML=h;
}

function lnEdit(gender,idx,col,val){
  if(!liunianData||!liunianData[gender])return;
  liunianData[gender][idx][col]=val;
  _liunianDirty=true;
  var bar=document.querySelector('.ln-save-bar');
  if(bar){
    var dirtySpan=bar.querySelector('.ln-dirty');
    if(!dirtySpan){
      var sp=document.createElement('span');sp.className='ln-dirty';sp.textContent='有未儲存的修改';
      bar.insertBefore(sp,bar.children[2]);
    }
  }
}

function saveLiunian(){
  if(!liunianData)return;
  var btn=document.querySelector('.ln-btn-save');
  if(btn){btn.disabled=true;btn.textContent='儲存中...';}
  var ts=new Date().toISOString();
  db.collection('settings').doc('liunian').set({
    liunianJson:JSON.stringify(liunianData),
    updatedAt:ts
  }).then(function(){
    _liunianSnapshot=JSON.stringify(liunianData);
    _liunianDirty=false;
    showToast('流年表已儲存 ✓',true);
    if(btn){btn.disabled=false;btn.textContent='儲存流年表';}
    renderLiunian();
  }).catch(function(e){
    showToast('儲存失敗：'+e.message,false);
    if(btn){btn.disabled=false;btn.textContent='儲存流年表';}
  });
}

function resetLiunian(){
  if(!_liunianSnapshot)return;
  if(!confirm('確定還原到上次儲存的狀態？'))return;
  liunianData=JSON.parse(_liunianSnapshot);
  _liunianDirty=false;
  renderLiunian();
}

// ==================== INIT ====================
async function init(){
  // Load rules
  try{
    var rdoc=await db.collection('settings').doc('rules').get();
    if(rdoc.exists&&rdoc.data().rulesJson){
      var p=JSON.parse(rdoc.data().rulesJson);
      if(Array.isArray(p)&&p.length===13&&p[0]&&p[0].parts){rules=p;console.log('[Rules] Firebase ✓');}
    }
  }catch(e){console.log('[Rules] Firebase error',e);}
  if(rules.length===0){
    try{var r=await fetch('rules/all_rules.json');rules=await r.json();console.log('[Rules] Local fallback');
      db.collection('settings').doc('rules').set({rulesJson:JSON.stringify(rules),updatedAt:new Date().toISOString()}).catch(()=>{});
    }catch(e){console.log('[Rules] Load failed',e);}
  }

  // Load questions
  try{
    var qdoc=await db.collection('settings').doc('questions').get();
    if(qdoc.exists&&qdoc.data().questionsJson){
      var pq=JSON.parse(qdoc.data().questionsJson);
      if(pq&&typeof pq==='object'&&Object.keys(pq).length>=11){questions=pq;console.log('[Questions] Firebase ✓');}
    }
  }catch(e){console.log('[Questions] Firebase error',e);}
  if(Object.keys(questions).length===0){
    // Fallback: use ALL_QUESTIONS_DEFAULT from all_questions.js
    if(typeof ALL_QUESTIONS_DEFAULT!=='undefined'){
      questions=JSON.parse(JSON.stringify(ALL_QUESTIONS_DEFAULT));
      console.log('[Questions] Local fallback (all_questions.js)');
      db.collection('settings').doc('questions').set({questionsJson:JSON.stringify(questions),updatedAt:new Date().toISOString()}).catch(()=>{});
    }else{console.log('[Questions] No fallback available');}
  }

  // Load liunian
  try{
    var ldoc=await db.collection('settings').doc('liunian').get();
    if(ldoc.exists&&ldoc.data().liunianJson){
      var pl=JSON.parse(ldoc.data().liunianJson);
      if(pl&&pl['男']&&pl['女']){liunianData=pl;console.log('[Liunian] Firebase ✓');}
    }
  }catch(e){console.log('[Liunian] Firebase error',e);}
  if(!liunianData){
    liunianData=JSON.parse(JSON.stringify(LIUNIAN_DEFAULT_DATA));
    console.log('[Liunian] Using default, uploading to Firebase...');
    db.collection('settings').doc('liunian').set({liunianJson:JSON.stringify(liunianData),updatedAt:new Date().toISOString()}).catch(function(){});
  }
  _liunianSnapshot=JSON.stringify(liunianData);

  renderAll();
  takeSnapshot();
  setStatus('就緒（規則 '+rules.length+' 維度，問題 '+Object.keys(questions).length+' 部位，流年 '+(liunianData?liunianData['男'].length+liunianData['女'].length:0)+' 筆）');
}

init();
</script>
