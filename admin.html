<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>人相兵法 — 評分規則編輯器</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#f7f4ef;--sidebar:#e8dfc8;--hover:#ece5d4;--border:#d4c9b0;--nav:#1e2127;--text:#1c1c1c;--text-2:#3d3b39;--text-3:#716b60;--active:#c03830;--static:#7A9E7E;--dynamic:#C17A5A;--dark:#1e2127}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);font-family:'Noto Serif TC',serif;height:100vh;overflow:hidden;color:var(--text);display:flex;flex-direction:column}
#top-bar{height:48px;background:var(--nav);display:flex;align-items:center;padding:0 20px;color:#e8e0d0;font-size:15px;font-weight:700;letter-spacing:3px;gap:16px}
#top-bar .status{font-size:12px;font-weight:400;color:rgba(255,255,255,0.5);margin-left:auto}
#top-bar button{height:32px;padding:0 16px;border:none;border-radius:4px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Noto Serif TC',serif;letter-spacing:1px}
.btn-save{background:var(--static);color:white}
.btn-load{background:var(--dynamic);color:white}
#main{flex:1;display:grid;grid-template-columns:200px 1fr;overflow:hidden}
#dim-list{background:var(--sidebar);border-right:1px solid var(--border);overflow-y:auto;padding:8px 0}
.dim-item{padding:10px 14px;cursor:pointer;font-size:14px;font-weight:500;color:var(--text-2);border-left:3px solid transparent;transition:all 0.1s}
.dim-item:hover{background:var(--hover)}
.dim-item.active{background:white;border-left-color:var(--active);font-weight:700;color:var(--text)}
.dim-cat{font-size:10px;font-weight:900;letter-spacing:2px;color:var(--text-3);padding:10px 14px 4px}
#editor{overflow-y:auto;padding:20px}
.part-section{margin-bottom:16px;background:white;border-radius:8px;border:1px solid var(--border);overflow:hidden}
.part-header{padding:10px 14px;background:var(--bg);border-bottom:1px solid var(--border);font-weight:700;font-size:15px;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.part-header:hover{background:var(--hover)}
.part-body{padding:12px 14px;display:none}
.part-body.open{display:block}
.node{margin:4px 0 4px 16px;padding:6px 10px;border-left:2px solid var(--border);font-size:13px}
.node-op{font-weight:700;color:var(--active);margin-right:6px}
.node-leaf{color:var(--text-2)}
.node-ref{font-weight:700;color:var(--text)}
.node-match{color:var(--static);font-weight:500}
.node-meta{color:var(--text-3);font-size:12px;margin-left:8px}
.node-actions{display:inline-flex;gap:4px;margin-left:8px;opacity:0.3}
.node:hover .node-actions{opacity:1}
.node-actions button{font-size:11px;padding:1px 6px;border:1px solid var(--border);border-radius:3px;background:white;cursor:pointer;font-family:'Noto Serif TC',serif}
.node-actions button:hover{background:var(--hover)}
.node-veto{border-left-color:var(--active)}
.node-lr{border-left-color:#9E8A5A}
.edit-row{display:flex;gap:6px;align-items:center;margin:4px 0;flex-wrap:wrap}
.edit-row select,.edit-row input{font-size:13px;padding:3px 6px;border:1px solid var(--border);border-radius:4px;font-family:'Noto Serif TC',serif}
.edit-row select{min-width:100px}
.edit-row input[type=number]{width:50px}
.edit-row label{font-size:12px;color:var(--text-3);min-width:40px}
.add-btn{font-size:12px;padding:3px 10px;border:1px dashed var(--border);border-radius:4px;background:transparent;cursor:pointer;color:var(--text-3);margin:6px 0 6px 16px;font-family:'Noto Serif TC',serif}
.add-btn:hover{background:var(--hover);border-color:var(--text-3)}
.del-btn{color:var(--active);border-color:var(--active)}
.del-btn:hover{background:#fef0ef}
</style>
</head>

red":false,"opts":["閉合線平","閉合線有曲度"]},"m7":{"text":"口閉緊","paired":false,"opts":["閉合線密","閉合線較鬆","放鬆見齒"]},"m8":{"text":"唇厚度","paired":false,"opts":["唇一般","唇明顯厚","唇薄"]},"m9":{"text":"唇厚均","paired":false,"opts":["唇厚平均","唇厚不均"]},"m10":{"text":"唇起","paired":false,"opts":["唇凸","唇不凸"]},"m11":{"text":"唇垂珠","paired":false,"opts":["有唇珠","無唇珠"]},"m12":{"text":"口中線","paired":false,"opts":["口位置適中","口位置不中"]},"m13":{"text":"口對稱","paired":false,"opts":["口對稱","口不對稱"]},"p1":{"text":"人中深淺","paired":false,"opts":["人中深","人中淺"]},"p2":{"text":"人中長短","paired":false,"opts":["人中長","人中短"]},"p3":{"text":"人中寬窄","paired":false,"opts":["人中寬度適中","人中窄"]},"p4":{"text":"人中方向","paired":false,"opts":["人中直","人中不直"]},"c1":{"text":"地閣朝","paired":false,"opts":["地閣起","地閣凸","地閣縮"]},"c2":{"text":"地閣平","paired":false,"opts":["地閣平","地閣圓","地閣凹"]},"c3":{"text":"地閣長短","paired":false,"opts":["地閣長","地閣適中","地閣短"]},"c4":{"text":"地閣寬窄","paired":false,"opts":["地閣寬","地閣窄尖"]},"c5":{"text":"地閣位置","paired":false,"opts":["地閣置中","地閣歪"]},"c6":{"text":"地閣骨肉","paired":false,"opts":["地閣有肉","地閣無肉"]},"y1":{"text":"頤角度","paired":true,"opts":["頤寬","頤平","頤削"]},"y2":{"text":"頤肉量","paired":true,"opts":["頤豐","頤有肉","頤露尖"]},"y3":{"text":"頤長短","paired":true,"opts":["頤長度正常","頤短"]},"y4":{"text":"雙頤一致性","paired":false,"opts":["雙頤一致","雙頤不一致"]}};

// All ref options for dropdown
const ALL_REFS=Object.keys(QMAP).sort((a,b)=>{
  const pa=a.replace(/\d+/,'').padEnd(3,' ');const pb=b.replace(/\d+/,'').padEnd(3,' ');
  if(pa!==pb)return pa<pb?-1:1;
  return parseInt(a.replace(/\D/g,''))-parseInt(b.replace(/\D/g,''));
});

var rules=[];
var curDim=0;

// Build ref dropdown options HTML
function refOptionsHtml(selected){
  let h='<option value="">選擇題目</option>';
  ALL_REFS.forEach(r=>{
    const q=QMAP[r];
    h+=`<option value="${r}"${r===selected?' selected':''}>${r} ${q.text}</option>`;
  });
  return h;
}

// Build match dropdown for a given ref
function matchOptionsHtml(ref,selected){
  const q=QMAP[ref];
  if(!q)return '<option>先選題目</option>';
  let h='';
  const selArr=Array.isArray(selected)?selected:[selected];
  q.opts.forEach(o=>{
    h+=`<option value="${o}"${selArr.includes(o)?' selected':''}>${o}</option>`;
  });
  return h;
}

// Render node tree (recursive)
function renderNode(node,path,depth){
  if(!node)return '<div class="node" style="color:var(--text-3)">(空)</div>';
  let h='';
  const indent=depth*8;

  // partResult
  if(node.partResult!==undefined){
    h+=`<div class="node" style="margin-left:${indent}px">`;
    h+=`<span class="node-op">partResult</span>`;
    h+=`<span class="node-ref">${node.partResult}</span>`;
    h+=nodeActions(path);
    h+='</div>';
    return h;
  }

  // Leaf node
  if(node.ref!==undefined){
    const q=QMAP[node.ref]||{text:'?'};
    const matchStr=Array.isArray(node.match)?node.match.join('｜'):node.match;
    h+=`<div class="node" style="margin-left:${indent}px">`;
    h+=`<span class="node-ref">${node.ref}</span> `;
    h+=`<span class="node-leaf">${q.text}</span> = `;
    h+=`<span class="node-match">${matchStr}</span>`;
    if(node.side)h+=`<span class="node-meta">side:${node.side}</span>`;
    if(node.weight&&node.weight>1)h+=`<span class="node-meta">×${node.weight}</span>`;
    h+=nodeActions(path);
    h+='</div>';
    return h;
  }

  // VETO wrapper
  if(node.veto){
    h+=`<div class="node node-veto" style="margin-left:${indent}px">`;
    h+=`<span class="node-op" style="color:var(--active)">VETO</span>`;
    h+=nodeActions(path);
    node.veto.forEach((v,vi)=>{
      h+=`<div style="margin-left:16px;font-size:12px;color:var(--text-3)">觸發→${v.result}</div>`;
      h+=renderNode(v.condition,path+'.veto.'+vi+'.condition',depth+1);
    });
    if(node.rule){
      h+=`<div style="margin-left:16px;font-size:12px;color:var(--text-3)">正常規則：</div>`;
      h+=renderNode(node.rule,path+'.rule',depth+1);
    }
    h+='</div>';
    return h;
  }

  // Inline rule
  if(node.rule&&!node.veto){
    return renderNode(node.rule,path+'.rule',depth);
  }

  // Operators
  const op=node.op;
  if(op==='AND'||op==='OR'||op==='COUNT'){
    h+=`<div class="node" style="margin-left:${indent}px">`;
    h+=`<span class="node-op">${op}</span>`;
    if(op==='COUNT')h+=`<span class="node-meta">min=${node.min}</span>`;
    h+=nodeActions(path);
    if(node.items){
      node.items.forEach((item,ii)=>{
        h+=renderNode(item,path+'.items.'+ii,depth+1);
      });
    }
    h+=addItemBtn(path);
    h+='</div>';
    return h;
  }

  if(op==='LR'){
    h+=`<div class="node node-lr" style="margin-left:${indent}px">`;
    h+=`<span class="node-op">LR</span>`;
    h+=`<span class="node-meta">merge=${node.merge}</span>`;
    h+=nodeActions(path);
    h+=`<div style="margin-left:16px;font-size:12px;color:var(--text-3)">each:</div>`;
    h+=renderNode(node.each,path+'.each',depth+1);
    h+='</div>';
    return h;
  }

  // Unknown
  h+=`<div class="node" style="margin-left:${indent}px;color:var(--text-3)">[未知節點: ${JSON.stringify(node).substring(0,80)}...]</div>`;
  return h;
}

function nodeActions(path){
  return `<span class="node-actions">
    <button onclick="editNode('${path}')">編輯</button>
    <button class="del-btn" onclick="deleteNode('${path}')">刪除</button>
  </span>`;
}

function addItemBtn(path){
  return `<button class="add-btn" onclick="addItem('${path}')">+ 新增條件</button>`;
}

// Get node by path string like "parts.頭.rule.items.0"
function getNode(obj,path){
  const parts=path.split('.');
  let cur=obj;
  for(const p of parts){
    if(cur===undefined)return undefined;
    if(/^\d+$/.test(p))cur=cur[parseInt(p)];
    else cur=cur[p];
  }
  return cur;
}

function setNode(obj,path,value){
  const parts=path.split('.');
  let cur=obj;
  for(let i=0;i<parts.length-1;i++){
    const p=parts[i];
    if(/^\d+$/.test(p))cur=cur[parseInt(p)];
    else cur=cur[p];
  }
  const last=parts[parts.length-1];
  if(/^\d+$/.test(last))cur[parseInt(last)]=value;
  else cur[last]=value;
}

function deleteAtPath(obj,path){
  const parts=path.split('.');
  let cur=obj;
  for(let i=0;i<parts.length-1;i++){
    const p=parts[i];
    if(/^\d+$/.test(p))cur=cur[parseInt(p)];
    else cur=cur[p];
  }
  const last=parts[parts.length-1];
  if(Array.isArray(cur)&&/^\d+$/.test(last)){
    cur.splice(parseInt(last),1);
  }else{
    delete cur[last];
  }
}

// Edit node inline
function editNode(path){
  const dimDef=rules[curDim];
  const node=getNode(dimDef,path);
  if(!node)return;

  // Build edit dialog
  let html='<div style="background:#faf8f5;border:1px solid var(--border);border-radius:6px;padding:12px;margin:8px 0">';
  html+='<div style="font-size:12px;font-weight:700;color:var(--text-3);margin-bottom:8px">編輯節點</div>';

  if(node.ref!==undefined){
    // Leaf edit
    html+=`<div class="edit-row"><label>題目</label><select id="edit-ref" onchange="updateMatchOpts()">${refOptionsHtml(node.ref)}</select></div>`;
    const matchVal=Array.isArray(node.match)?node.match:[node.match];
    html+=`<div class="edit-row"><label>選項</label><select id="edit-match" multiple size="3">${matchOptionsHtml(node.ref,matchVal)}</select></div>`;
    html+=`<div class="edit-row"><label>Side</label><select id="edit-side"><option value=""${!node.side?' selected':''}>無</option><option value="L"${node.side==='L'?' selected':''}>L</option><option value="R"${node.side==='R'?' selected':''}>R</option><option value="null"${node.side===null?' selected':''}>null（LR不覆蓋）</option></select></div>`;
    html+=`<div class="edit-row"><label>Weight</label><input type="number" id="edit-weight" value="${node.weight||1}" min="1"></div>`;
  }else if(node.op==='COUNT'){
    html+=`<div class="edit-row"><label>min</label><input type="number" id="edit-min" value="${node.min}" min="0"></div>`;
  }else if(node.op==='LR'){
    html+=`<div class="edit-row"><label>merge</label><select id="edit-merge"><option value="any"${node.merge==='any'?' selected':''}>any（任一邊）</option><option value="all"${node.merge==='all'?' selected':''}>all（雙邊都要）</option></select></div>`;
  }else if(node.partResult!==undefined){
    html+=`<div class="edit-row"><label>部位</label><input type="text" id="edit-partresult" value="${node.partResult}" style="width:120px"></div>`;
  }

  html+=`<div style="margin-top:8px;display:flex;gap:6px">`;
  html+=`<button onclick="saveEdit('${path}')" style="padding:4px 12px;background:var(--static);color:white;border:none;border-radius:4px;cursor:pointer;font-family:'Noto Serif TC',serif">確定</button>`;
  html+=`<button onclick="render()" style="padding:4px 12px;border:1px solid var(--border);border-radius:4px;cursor:pointer;font-family:'Noto Serif TC',serif">取消</button>`;
  html+=`</div></div>`;

  // Insert after the node
  const nodeEl=event.target.closest('.node');
  if(nodeEl){
    const div=document.createElement('div');
    div.innerHTML=html;
    nodeEl.after(div);
  }
}

function updateMatchOpts(){
  const ref=document.getElementById('edit-ref').value;
  const sel=document.getElementById('edit-match');
  sel.innerHTML=matchOptionsHtml(ref,[]);
}

function saveEdit(path){
  const dimDef=rules[curDim];
  const node=getNode(dimDef,path);
  if(!node)return;

  if(node.ref!==undefined){
    node.ref=document.getElementById('edit-ref').value;
    const sel=document.getElementById('edit-match');
    const vals=[...sel.selectedOptions].map(o=>o.value);
    node.match=vals.length===1?vals[0]:vals;
    const side=document.getElementById('edit-side').value;
    if(side==='null')node.side=null;
    else if(side)node.side=side;
    else delete node.side;
    const w=parseInt(document.getElementById('edit-weight').value)||1;
    if(w>1)node.weight=w;else delete node.weight;
  }else if(node.op==='COUNT'){
    node.min=parseInt(document.getElementById('edit-min').value)||0;
  }else if(node.op==='LR'){
    node.merge=document.getElementById('edit-merge').value;
  }else if(node.partResult!==undefined){
    node.partResult=document.getElementById('edit-partresult').value;
  }

  render();
  setStatus('已修改（未儲存）');
}

function deleteNode(path){
  if(!confirm('確定刪除此節點？'))return;
  deleteAtPath(rules[curDim],path);
  render();
  setStatus('已刪除（未儲存）');
}

function addItem(path){
  const node=getNode(rules[curDim],path);
  if(!node||!node.items)return;
  // Add a new leaf node
  node.items.push({ref:'h1',match:'龜背'});
  render();
  setStatus('已新增（未儲存）');
}

// Render sidebar + editor
function render(){
  // Sidebar
  let sh='';
  let lastCat='';
  rules.forEach((d,i)=>{
    const cat=d.category||'';
    if(cat!==lastCat){sh+=`<div class="dim-cat">${cat}</div>`;lastCat=cat;}
    sh+=`<div class="dim-item${i===curDim?' active':''}" onclick="selectDim(${i})" style="border-left-color:${i===curDim?DIM_COLORS[i]:'transparent'}">${d.positive}${d.negative}</div>`;
  });
  document.getElementById('dim-list').innerHTML=sh;

  // Editor
  const dim=rules[curDim];
  if(!dim){document.getElementById('editor').innerHTML='<div style="padding:20px;color:var(--text-3)">無資料</div>';return;}
  let eh=`<div style="font-size:18px;font-weight:900;margin-bottom:4px;color:var(--text)">${dim.positive}${dim.negative}</div>`;
  eh+=`<div style="font-size:13px;color:var(--text-3);margin-bottom:16px">${dim.category} · ${dim.positive}（${dim.positiveType}）vs ${dim.negative}（${dim.negativeType}）</div>`;

  PART_ORDER.forEach(pn=>{
    const partDef=dim.parts[pn];
    const hasRule=!!partDef;
    eh+=`<div class="part-section">`;
    eh+=`<div class="part-header" onclick="togglePart(this)">${pn} ${hasRule?'':'<span style=\"color:var(--text-3);font-weight:400\">（未定義）</span>'}<span style="font-size:12px;color:var(--text-3)">▼</span></div>`;
    eh+=`<div class="part-body">`;
    if(hasRule){
      eh+=renderNode(partDef,'parts.'+pn,0);
    }else{
      eh+=`<div style="color:var(--text-3);font-size:13px">此部位無規則</div>`;
    }
    eh+=`</div></div>`;
  });

  document.getElementById('editor').innerHTML=eh;
}

function selectDim(i){curDim=i;render();}
function togglePart(el){el.nextElementSibling.classList.toggle('open');}
function setStatus(msg){document.getElementById('status').textContent=msg;}

// Firebase
function saveToFirebase(){
  setStatus('儲存中...');
  db.collection('settings').doc('rules').set({
    rulesJson:JSON.stringify(rules),
    updatedAt:new Date().toISOString()
  }).then(()=>{setStatus('已儲存到 Firebase ✓');})
    .catch(e=>{setStatus('儲存失敗: '+e.message);});
}

function loadFromFirebase(){
  setStatus('載入中...');
  db.collection('settings').doc('rules').get().then(doc=>{
    if(doc.exists&&doc.data().rulesJson){
      rules=JSON.parse(doc.data().rulesJson);
      render();
      setStatus('已從 Firebase 載入 ✓');
    }else{
      setStatus('Firebase 無資料，使用本地規則');
    }
  }).catch(e=>{setStatus('載入失敗: '+e.message);});
}

// Init: load from local JSON
fetch('rules/all_rules.json')
  .then(r=>r.json())
  .then(data=>{rules=data;render();setStatus('已載入本地規則');})
  .catch(()=>{setStatus('載入失敗');});
</script>
