<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>照片輔助觀察訓練</title>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #1e2127;
  --bg2: #262930;
  --bg3: #2c2f36;
  --border: #3a3d44;
  --text: #e8e0d0;
  --text2: #b0a898;
  --text3: #7a7468;
  --accent: #C17A5A;
  --green: #7A9E7E;
  --red: #c03830;
  --gold: #9a7c4a;
  --blue: #5a8abf;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  font-family: 'Noto Serif TC', serif;
  color: var(--text);
  min-height: 100vh;
  -webkit-text-size-adjust: 100%;
}
button { font-family: 'Noto Serif TC', serif; cursor: pointer; }
input { font-family: 'Noto Serif TC', serif; }

/* ===== Top Nav ===== */
.top-nav {
  height: 48px;
  background: #16181c;
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 12px;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
}
.nav-brand {
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 2px;
  color: var(--text);
  white-space: nowrap;
}
.nav-back {
  background: none;
  border: 1px solid var(--border);
  color: var(--text2);
  font-size: 13px;
  padding: 4px 12px;
  border-radius: 4px;
}
.nav-back:hover { border-color: var(--text2); color: var(--text); }
.nav-spacer { flex: 1; }
.nav-stats {
  font-size: 12px;
  color: var(--text3);
  letter-spacing: 1px;
}

/* ===== View: List ===== */
.view { display: none; }
.view.active { display: block; }

.list-header {
  padding: 24px 20px 16px;
  display: flex;
  align-items: center;
  gap: 16px;
  border-bottom: 1px solid var(--border);
}
.list-header h1 {
  font-size: 20px;
  font-weight: 900;
  letter-spacing: 3px;
  flex: 1;
}
.btn-add {
  background: var(--accent);
  color: white;
  border: none;
  padding: 8px 20px;
  border-radius: 6px;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 1px;
}
.btn-add:hover { opacity: 0.9; }

.photo-list {
  padding: 12px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 12px;
}
.photo-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px;
  cursor: pointer;
  transition: border-color 0.15s;
}
.photo-card:hover { border-color: var(--accent); }
.photo-card-top {
  display: flex;
  gap: 12px;
  margin-bottom: 10px;
}
.photo-thumb {
  width: 64px;
  height: 64px;
  border-radius: 6px;
  object-fit: cover;
  background: var(--bg3);
  flex-shrink: 0;
}
.photo-card-info { flex: 1; min-width: 0; }
.photo-card-name {
  font-size: 15px;
  font-weight: 700;
  margin-bottom: 4px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.photo-card-date {
  font-size: 12px;
  color: var(--text3);
}
.photo-card-bar {
  height: 4px;
  background: var(--bg3);
  border-radius: 2px;
  overflow: hidden;
  margin-bottom: 6px;
}
.photo-card-bar-fill {
  height: 100%;
  border-radius: 2px;
  transition: width 0.3s;
}
.photo-card-stats {
  font-size: 12px;
  color: var(--text2);
  display: flex;
  gap: 12px;
}

.empty-state {
  text-align: center;
  padding: 80px 20px;
  color: var(--text3);
}
.empty-state p { font-size: 16px; margin-bottom: 20px; letter-spacing: 2px; }

/* ===== View: Upload ===== */
.upload-container {
  max-width: 480px;
  margin: 0 auto;
  padding: 32px 20px;
}
.upload-container h2 {
  font-size: 18px;
  font-weight: 900;
  letter-spacing: 2px;
  margin-bottom: 24px;
}
.form-group {
  margin-bottom: 20px;
}
.form-group label {
  display: block;
  font-size: 13px;
  font-weight: 700;
  color: var(--text2);
  margin-bottom: 8px;
  letter-spacing: 1px;
}
.form-group input[type="text"] {
  width: 100%;
  background: var(--bg2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 10px 14px;
  border-radius: 6px;
  font-size: 15px;
}
.form-group input[type="text"]:focus {
  outline: none;
  border-color: var(--accent);
}
.upload-area {
  border: 2px dashed var(--border);
  border-radius: 8px;
  padding: 24px;
  text-align: center;
  cursor: pointer;
  transition: border-color 0.15s;
  position: relative;
}
.upload-area:hover { border-color: var(--accent); }
.upload-area.has-file { border-color: var(--green); border-style: solid; }
.upload-area input[type="file"] {
  position: absolute;
  inset: 0;
  opacity: 0;
  cursor: pointer;
}
.upload-area p { color: var(--text3); font-size: 14px; }
.upload-area .file-name { color: var(--green); font-weight: 700; }
.upload-preview {
  max-width: 120px;
  max-height: 120px;
  border-radius: 6px;
  margin-top: 8px;
}
.upload-hint {
  font-size: 12px;
  color: var(--text3);
  margin-top: 4px;
}
.btn-submit {
  width: 100%;
  background: var(--accent);
  color: white;
  border: none;
  padding: 14px;
  border-radius: 8px;
  font-size: 16px;
  font-weight: 900;
  letter-spacing: 2px;
  margin-top: 8px;
}
.btn-submit:disabled { opacity: 0.4; cursor: not-allowed; }

/* ===== View: Detail ===== */
.detail-photos {
  display: flex;
  gap: 8px;
  padding: 12px;
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
  background: var(--bg2);
}
.detail-photo {
  height: 160px;
  border-radius: 6px;
  cursor: pointer;
  flex-shrink: 0;
}
.detail-photo:hover { opacity: 0.85; }

.detail-status {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}
.status-badge {
  font-size: 12px;
  font-weight: 700;
  padding: 4px 12px;
  border-radius: 4px;
  letter-spacing: 1px;
}
.status-badge.pending { background: var(--bg3); color: var(--text3); }
.status-badge.loading { background: #3a3520; color: #d4a834; }
.status-badge.done { background: #1e3320; color: var(--green); }
.btn-claude {
  background: var(--blue);
  color: white;
  border: none;
  padding: 6px 16px;
  border-radius: 4px;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 1px;
}
.btn-claude:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-delete-record {
  background: none;
  border: 1px solid var(--red);
  color: var(--red);
  padding: 4px 12px;
  border-radius: 4px;
  font-size: 12px;
  font-weight: 700;
}
.btn-delete-record:hover { background: var(--red); color: white; }

.detail-progress {
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 13px;
  color: var(--text2);
}
.progress-bar {
  flex: 1;
  height: 6px;
  background: var(--bg3);
  border-radius: 3px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: var(--green);
  border-radius: 3px;
  transition: width 0.3s;
}
.accuracy-num { font-weight: 700; color: var(--green); }

/* ===== Review Section ===== */
.review-sections {
  padding-bottom: 80px;
}
.section-header {
  position: sticky;
  top: 48px;
  z-index: 10;
  background: var(--bg3);
  padding: 10px 16px;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 2px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 8px;
}
.section-count {
  font-size: 12px;
  color: var(--text3);
  font-weight: 500;
}

.review-card {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
}
.review-card.reviewed { background: var(--bg2); }

.review-q-top {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  margin-bottom: 8px;
  flex-wrap: wrap;
}
.review-qid {
  font-size: 11px;
  font-family: monospace;
  color: var(--text3);
  background: var(--bg3);
  padding: 2px 6px;
  border-radius: 3px;
  flex-shrink: 0;
}
.review-cat {
  font-size: 10px;
  font-weight: 700;
  padding: 2px 6px;
  border-radius: 3px;
  flex-shrink: 0;
}
.review-cat.cat-A { background: #1e3320; color: var(--green); }
.review-cat.cat-B { background: #3a3520; color: #d4a834; }
.review-cat.cat-C { background: #3a2020; color: #c06060; }
.review-q-text {
  font-size: 14px;
  font-weight: 700;
  flex: 1;
  min-width: 0;
}

/* LR layout */
.review-lr-wrap {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.review-lr-col {
  background: var(--bg3);
  border-radius: 6px;
  padding: 10px;
}
.review-lr-label {
  font-size: 11px;
  font-weight: 700;
  color: var(--text3);
  margin-bottom: 6px;
  letter-spacing: 1px;
}

/* Claude answer display */
.claude-answer {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 8px;
  flex-wrap: wrap;
}
.claude-val {
  font-size: 14px;
  font-weight: 700;
  color: var(--blue);
}
.claude-null {
  font-size: 13px;
  color: var(--text3);
  font-style: italic;
}
.conf-badge {
  font-size: 10px;
  font-weight: 700;
  padding: 1px 6px;
  border-radius: 3px;
}
.conf-H { background: #1e3320; color: var(--green); }
.conf-M { background: #3a3520; color: #d4a834; }
.conf-L { background: #3a2020; color: #c06060; }

/* Review buttons */
.review-btns {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.rbtn {
  font-size: 12px;
  font-weight: 700;
  padding: 5px 12px;
  border-radius: 4px;
  border: 1px solid var(--border);
  background: var(--bg);
  color: var(--text2);
  letter-spacing: 1px;
  transition: all 0.1s;
}
.rbtn:hover { border-color: var(--text2); }
.rbtn.sel-correct { background: var(--green); color: white; border-color: var(--green); }
.rbtn.sel-wrong { background: var(--red); color: white; border-color: var(--red); }
.rbtn.sel-cannot { background: var(--text3); color: white; border-color: var(--text3); }

/* Correct answer selector (when marked wrong) */
.correct-select {
  margin-top: 6px;
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
}
.correct-opt {
  font-size: 11px;
  padding: 3px 8px;
  border-radius: 3px;
  border: 1px solid var(--border);
  background: var(--bg);
  color: var(--text2);
}
.correct-opt:hover { border-color: var(--accent); }
.correct-opt.selected { background: var(--accent); color: white; border-color: var(--accent); }

/* Photo lightbox */
.lightbox {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.9);
  z-index: 9999;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}
.lightbox.show { display: flex; }
.lightbox img {
  max-width: 95vw;
  max-height: 95vh;
  object-fit: contain;
}

/* Loading overlay */
.loading-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 9000;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 16px;
}
.loading-overlay.show { display: flex; }
.spinner {
  width: 40px;
  height: 40px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { color: var(--text2); font-size: 14px; letter-spacing: 2px; }

@media (max-width: 600px) {
  .review-lr-wrap { grid-template-columns: 1fr; }
  .photo-list { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- Top Nav -->
<div class="top-nav">
  <div class="nav-brand">照片觀察訓練</div>
  <button class="nav-back" id="navBack" style="display:none" onclick="showView('list')">← 返回清單</button>
  <div class="nav-spacer"></div>
  <div class="nav-stats" id="navStats"></div>
</div>

<!-- View: List -->
<div class="view active" id="viewList">
  <div class="list-header">
    <h1>照片記錄</h1>
    <button class="btn-add" onclick="showView('upload')">＋ 新增照片</button>
  </div>
  <div id="photoList" class="photo-list"></div>
  <div id="emptyState" class="empty-state" style="display:none">
    <p>尚無照片記錄</p>
    <button class="btn-add" onclick="showView('upload')">＋ 新增第一張照片</button>
  </div>
</div>

<!-- View: Upload -->
<div class="view" id="viewUpload">
  <div class="upload-container">
    <h2>新增照片</h2>
    <div class="form-group">
      <label>標示名稱</label>
      <input type="text" id="inputName" placeholder="例如：案例01" />
    </div>
    <div class="form-group">
      <label>正面照（必要）</label>
      <div class="upload-area" id="frontArea">
        <input type="file" accept="image/*" capture="environment" onchange="handleFile(this,'front')" />
        <p id="frontLabel">點擊上傳或拍照</p>
        <img class="upload-preview" id="frontPreview" style="display:none" />
      </div>
    </div>
    <div class="form-group">
      <label>側面照（選填）</label>
      <div class="upload-area" id="sideArea">
        <input type="file" accept="image/*" capture="environment" onchange="handleFile(this,'side')" />
        <p id="sideLabel">點擊上傳或拍照</p>
        <img class="upload-preview" id="sidePreview" style="display:none" />
      </div>
    </div>
    <button class="btn-submit" id="btnUpload" disabled onclick="doUpload()">建立並上傳</button>
  </div>
</div>

<!-- View: Detail -->
<div class="view" id="viewDetail">
  <div class="detail-photos" id="detailPhotos"></div>
  <div class="detail-status" id="detailStatus"></div>
  <div class="detail-progress" id="detailProgress" style="display:none"></div>
  <div class="review-sections" id="reviewSections"></div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="this.classList.remove('show')">
  <img id="lightboxImg" />
</div>

<!-- Loading -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-text" id="loadingText">處理中...</div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

const PARTS = ["頭","上停","耳","眉","眼","鼻","顴","口","人中","地閣","頤"];
const PART_LABELS = { "頭":"頭","上停":"上停（額）","耳":"耳","眉":"眉","眼":"眼","鼻":"鼻","顴":"顴","口":"口","人中":"人中","地閣":"地閣","頤":"頤" };

// Build question text for Claude prompt
function buildQuestionPrompt() {
  let text = '以下是 124 題觀察問題，請逐題根據照片回答。\n\n';
  let currentPart = '';
  for (const q of QUESTIONS) {
    if (q.part !== currentPart) {
      currentPart = q.part;
      const count = QUESTIONS.filter(x => x.part === currentPart).length;
      text += `\n## ${PART_LABELS[currentPart]}（${count}題）\n`;
    }
    const lr = q.lr ? ' [左右]' : '';
    text += `${q.qId}${lr} ${q.text}：${q.options.join(' / ')}\n`;
  }
  return text;
}

// Expand questions (LR -> _L/_R keys)
function expandKeys() {
  const keys = [];
  for (const q of QUESTIONS) {
    if (q.lr) {
      keys.push({ key: q.qId + '_L', q, side: '左' });
      keys.push({ key: q.qId + '_R', q, side: '右' });
    } else {
      keys.push({ key: q.qId, q, side: null });
    }
  }
  return keys;
}
const ALL_KEYS = expandKeys();

  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view' + name.charAt(0).toUpperCase() + name.slice(1)).classList.add('active');
  document.getElementById('navBack').style.display = (name === 'list') ? 'none' : '';
  if (name === 'list') loadList();

async function loadList() {
  const snap = await db.collection(COL).orderBy('createdAt', 'desc').get();
  const list = document.getElementById('photoList');
  const empty = document.getElementById('emptyState');

  if (snap.empty) {
    list.innerHTML = '';
    empty.style.display = '';
    return;
  }
  empty.style.display = 'none';

  list.innerHTML = snap.docs.map(doc => {
    const d = doc.data();
    const stats = d.stats || {};
    const total = ALL_KEYS.length;
    const reviewed = stats.reviewed || 0;
    const pct = total ? Math.round(reviewed / total * 100) : 0;
    const acc = stats.accuracy != null ? stats.accuracy.toFixed(1) + '%' : '—';
    const barColor = (stats.accuracy != null && stats.accuracy >= 70) ? 'var(--green)' : 'var(--accent)';
    const date = d.createdAt ? new Date(d.createdAt.seconds * 1000).toLocaleDateString('zh-TW') : '';
    const thumb = d.photoFrontURL || '';
    return `<div class="photo-card" onclick="openDetail('${doc.id}')">
      <div class="photo-card-top">
        ${thumb ? `<img class="photo-thumb" src="${thumb}" />` : '<div class="photo-thumb"></div>'}
        <div class="photo-card-info">
          <div class="photo-card-name">${esc(d.name || '未命名')}</div>
          <div class="photo-card-date">${date}</div>
        </div>
      </div>
      <div class="photo-card-bar"><div class="photo-card-bar-fill" style="width:${pct}%;background:${barColor}"></div></div>
      <div class="photo-card-stats">
        <span>審核 ${reviewed}/${total}</span>
        <span>準確率 ${acc}</span>
      </div>
    </div>`;
  }).join('');
}

function fileToDataURL(file, maxDim) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        // Resize if needed to keep Firestore doc under 1MB
        const max = maxDim || 1200;
        let w = img.width, h = img.height;
        if (w > max || h > max) {
          if (w > h) { h = Math.round(h * max / w); w = max; }
          else { w = Math.round(w * max / h); h = max; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', 0.8));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function handleFile(input, type) {
  const file = input.files[0];
  if (!file) return;
  uploadFiles[type] = file;
  const area = document.getElementById(type + 'Area');
  const label = document.getElementById(type + 'Label');
  const preview = document.getElementById(type + 'Preview');
  area.classList.add('has-file');
  label.innerHTML = `<span class="file-name">${esc(file.name)}</span>`;
  const reader = new FileReader();
  reader.onload = e => { preview.src = e.target.result; preview.style.display = ''; };
  reader.readAsDataURL(file);
  checkUploadReady();
}

function checkUploadReady() {
  const name = document.getElementById('inputName').value.trim();
  document.getElementById('btnUpload').disabled = !(name && uploadFiles.front);
}

// Listen for name input changes
document.getElementById('inputName').addEventListener('input', checkUploadReady);

async function doUpload() {
  const name = document.getElementById('inputName').value.trim();
  if (!name || !uploadFiles.front) return;

  showLoading('處理照片中...');

  try {
    // Convert photos to base64 DataURL (resized to max 1200px)
    const frontDataURL = await fileToDataURL(uploadFiles.front, 1200);
    let sideDataURL = null;
    if (uploadFiles.side) {
      sideDataURL = await fileToDataURL(uploadFiles.side, 1200);
    }

    showLoading('儲存中...');

    // Store base64 DataURL directly in Firestore (no Storage needed)
    const docRef = await db.collection(COL).add({
      name,
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
      photoFrontURL: frontDataURL,
      photoSideURL: sideDataURL,
      claudeResults: null,
      mikeReview: {},
      stats: { totalJudged: 0, reviewed: 0, correct: 0, wrong: 0, cannot: 0, accuracy: 0 }
    });

    // Reset upload form
    uploadFiles = { front: null, side: null };
    document.getElementById('inputName').value = '';
    document.getElementById('frontArea').classList.remove('has-file');
    document.getElementById('sideArea').classList.remove('has-file');
    document.getElementById('frontLabel').textContent = '點擊上傳或拍照';
    document.getElementById('sideLabel').textContent = '點擊上傳或拍照';
    document.getElementById('frontPreview').style.display = 'none';
    document.getElementById('sidePreview').style.display = 'none';
    document.getElementById('btnUpload').disabled = true;

    hideLoading();
    openDetail(docRef.id);
  } catch (err) {
    hideLoading();
    alert('上傳失敗：' + err.message);
  }
}

// ============================================================
// Detail View
// ============================================================
async function openDetail(docId) {
  currentDocId = docId;
  showView('detail');
  showLoading('載入中...');

  const snap = await db.collection(COL).doc(docId).get();
  if (!snap.exists) { hideLoading(); alert('記錄不存在'); showView('list'); return; }
  currentDoc = snap.data();
  hideLoading();
  renderDetail();
}

function renderDetail() {
  const d = currentDoc;

  // Photos
  const photosEl = document.getElementById('detailPhotos');
  let photosHTML = '';
  if (d.photoFrontURL) {
    photosHTML += `<img class="detail-photo" src="${d.photoFrontURL}" onclick="showLightbox('${d.photoFrontURL}')" title="正面照" />`;
  }
  if (d.photoSideURL) {
    photosHTML += `<img class="detail-photo" src="${d.photoSideURL}" onclick="showLightbox('${d.photoSideURL}')" title="側面照" />`;
  }
  photosEl.innerHTML = photosHTML;

  // Status
  const statusEl = document.getElementById('detailStatus');
  const hasClaude = d.claudeResults != null;
  let statusHTML = '';
  if (!hasClaude) {
    statusHTML = `<span class="status-badge pending">未判讀</span>
      <button class="btn-claude" onclick="startClaude()">開始 Claude 判讀</button>`;
  } else {
    statusHTML = `<span class="status-badge done">已判讀</span>`;
  }
  statusHTML += `<div style="flex:1"></div>`;
  statusHTML += `<button class="btn-delete-record" onclick="deleteRecord()">刪除記錄</button>`;
  statusEl.innerHTML = statusHTML;

  // Progress
  renderProgress();

  // Review sections
  if (hasClaude) {
    renderReview();
  } else {
    document.getElementById('reviewSections').innerHTML = '<div class="empty-state"><p>請先進行 Claude 判讀</p></div>';
  }
}

function renderProgress() {
  const d = currentDoc;
  const progEl = document.getElementById('detailProgress');
  const stats = d.stats || {};
  const total = ALL_KEYS.length;
  const reviewed = stats.reviewed || 0;

  if (!d.claudeResults) {
    progEl.style.display = 'none';
    return;
  }

  progEl.style.display = '';
  const pct = total ? Math.round(reviewed / total * 100) : 0;
  const correct = stats.correct || 0;
  const wrong = stats.wrong || 0;
  const cannot = stats.cannot || 0;
  const acc = (correct + wrong) > 0 ? (correct / (correct + wrong) * 100).toFixed(1) : '—';

  progEl.innerHTML = `
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    <span>${reviewed}/${total} 已審</span>
    <span style="color:var(--green)">✓${correct}</span>
    <span style="color:var(--red)">✗${wrong}</span>
    <span style="color:var(--text3)">⊘${cannot}</span>
    <span class="accuracy-num">${acc}${acc !== '—' ? '%' : ''}</span>
  `;
}

function renderReview() {
  const d = currentDoc;
  const cr = d.claudeResults || {};
  const mr = d.mikeReview || {};
  const container = document.getElementById('reviewSections');
  let html = '';
  let currentPart = '';

  for (const part of PARTS) {
    const qs = QUESTIONS.filter(q => q.part === part);
    if (!qs.length) continue;

    const partReviewCount = qs.reduce((sum, q) => {
      if (q.lr) {
        return sum + (mr[q.qId+'_L'] ? 1 : 0) + (mr[q.qId+'_R'] ? 1 : 0);
      }
      return sum + (mr[q.qId] ? 1 : 0);
    }, 0);
    const partTotal = qs.reduce((sum, q) => sum + (q.lr ? 2 : 1), 0);

    html += `<div class="section-header">${PART_LABELS[part]} <span class="section-count">${partReviewCount}/${partTotal}</span></div>`;

    for (const q of qs) {
      html += `<div class="review-card ${isFullyReviewed(q, mr) ? 'reviewed' : ''}" id="card-${q.qId}">`;
      html += `<div class="review-q-top">
        <span class="review-qid">${q.qId}</span>
        <span class="review-cat cat-${q.cat}">${q.cat === 'A' ? '照片高' : q.cat === 'B' ? '照片中' : '照片難'}</span>
        <span class="review-q-text">${esc(q.text)}</span>
      </div>`;

      if (q.lr) {
        html += `<div class="review-lr-wrap">`;
        for (const side of ['L', 'R']) {
          const key = q.qId + '_' + side;
          const label = side === 'L' ? '左' : '右';
          html += `<div class="review-lr-col">
            <div class="review-lr-label">${label}</div>
            ${renderClaudeAnswer(key, cr)}
            ${renderReviewButtons(key, q, cr, mr)}
          </div>`;
        }
        html += `</div>`;
      } else {
        html += renderClaudeAnswer(q.qId, cr);
        html += renderReviewButtons(q.qId, q, cr, mr);
      }

      html += `</div>`;
    }
  }

  container.innerHTML = html;
}

function isFullyReviewed(q, mr) {
  if (q.lr) return !!(mr[q.qId+'_L'] && mr[q.qId+'_R']);
  return !!mr[q.qId];
}

function renderClaudeAnswer(key, cr) {
  const r = cr[key];
  if (!r || r.answer == null) {
    return `<div class="claude-answer"><span class="claude-null">Claude 無法判斷</span></div>`;
  }
  const confClass = r.confidence ? 'conf-' + r.confidence : '';
  const confText = r.confidence || '';
  return `<div class="claude-answer">
    <span class="claude-val">${esc(r.answer)}</span>
    ${confText ? `<span class="conf-badge ${confClass}">${confText}</span>` : ''}
  </div>`;
}

function renderReviewButtons(key, q, cr, mr) {
  const review = mr[key];
  const claudeResult = cr[key];
  const hasAnswer = claudeResult && claudeResult.answer != null;

  let html = '<div class="review-btns">';

  if (hasAnswer) {
    const isCorrect = review && review.status === 'correct';
    const isWrong = review && review.status === 'wrong';
    const isCannot = review && review.status === 'cannot';

    html += `<button class="rbtn ${isCorrect ? 'sel-correct' : ''}" onclick="markReview('${key}','correct')">✓ 對</button>`;
    html += `<button class="rbtn ${isWrong ? 'sel-wrong' : ''}" onclick="markReview('${key}','wrong')">✗ 錯</button>`;
    html += `<button class="rbtn ${isCannot ? 'sel-cannot' : ''}" onclick="markReview('${key}','cannot')">⊘ 無法判</button>`;
    html += `</div>`;

    // If marked wrong, show correct answer selector
    if (isWrong) {
      html += `<div class="correct-select">`;
      for (const opt of q.options) {
        if (opt === claudeResult.answer) continue; // skip the wrong answer
        const selected = review.correctAnswer === opt;
        html += `<button class="correct-opt ${selected ? 'selected' : ''}" onclick="setCorrectAnswer('${key}','${opt.replace(/'/g, "\\'")}')">
          ${esc(opt)}
        </button>`;
      }
      html += `</div>`;
    }
  } else {
    // Claude couldn't judge - Mike can fill in or mark cannot
    const isCannot = review && review.status === 'cannot';
    html += `<button class="rbtn ${isCannot ? 'sel-cannot' : ''}" onclick="markReview('${key}','cannot')">⊘ 無法判</button>`;
    html += `</div>`;
    // Let Mike pick an answer directly
    html += `<div class="correct-select" style="margin-top:6px">`;
    for (const opt of q.options) {
      const selected = review && review.status === 'filled' && review.correctAnswer === opt;
      html += `<button class="correct-opt ${selected ? 'selected' : ''}" onclick="fillAnswer('${key}','${opt.replace(/'/g, "\\'")}')">
        ${esc(opt)}
      </button>`;
    }
    html += `</div>`;
  }

  return html;
}

// ============================================================
// Review Actions
// ============================================================
async function markReview(key, status) {
  if (!currentDocId || !currentDoc) return;
  const mr = currentDoc.mikeReview || {};

  if (status === 'correct' || status === 'cannot') {
    mr[key] = { status };
  } else if (status === 'wrong') {
    mr[key] = { status: 'wrong', correctAnswer: null };
  }

  currentDoc.mikeReview = mr;
  recalcStats();
  renderReview();
  renderProgress();
  saveReview();
}

async function setCorrectAnswer(key, answer) {
  if (!currentDocId || !currentDoc) return;
  const mr = currentDoc.mikeReview || {};
  if (mr[key]) {
    mr[key].correctAnswer = answer;
  }
  currentDoc.mikeReview = mr;
  renderReview();
  saveReview();
}

async function fillAnswer(key, answer) {
  if (!currentDocId || !currentDoc) return;
  const mr = currentDoc.mikeReview || {};
  mr[key] = { status: 'filled', correctAnswer: answer };
  currentDoc.mikeReview = mr;
  recalcStats();
  renderReview();
  renderProgress();
  saveReview();
}

function recalcStats() {
  const mr = currentDoc.mikeReview || {};
  const cr = currentDoc.claudeResults || {};
  let reviewed = 0, correct = 0, wrong = 0, cannot = 0, totalJudged = 0;

  for (const { key } of ALL_KEYS) {
    const c = cr[key];
    if (c && c.answer != null) totalJudged++;
    const r = mr[key];
    if (r) {
      reviewed++;
      if (r.status === 'correct') correct++;
      else if (r.status === 'wrong') wrong++;
      else if (r.status === 'cannot' || r.status === 'filled') cannot++;
    }
  }

  const accuracy = (correct + wrong) > 0 ? (correct / (correct + wrong) * 100) : 0;
  currentDoc.stats = { totalJudged, reviewed, correct, wrong, cannot, accuracy };
}

let saveTimer = null;
function saveReview() {
  if (saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    if (!currentDocId) return;
    try {
      await db.collection(COL).doc(currentDocId).update({
        mikeReview: currentDoc.mikeReview,
        stats: currentDoc.stats,
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      });
    } catch (err) {
      console.error('Save failed:', err);
    }
  }, 500);
}

// ============================================================
// Claude Vision
// ============================================================
function parseDataURL(dataURL) {
  if (!dataURL) return { base64: null, mediaType: null };
  const match = dataURL.match(/^data:(image\/[a-z]+);base64,(.+)$/s);
  if (match) {
    return { base64: match[2].replace(/\s/g, ''), mediaType: match[1] };
  }
  // Already raw base64
  return { base64: dataURL.replace(/\s/g, ''), mediaType: 'image/jpeg' };
}

async function startClaude() {
  if (!currentDoc) return;

  // Re-read from Firestore to ensure we have the full document
  showLoading('讀取照片中...');
  try {
    const snap = await db.collection(COL).doc(currentDocId).get();
    if (!snap.exists) { hideLoading(); alert('記錄不存在'); return; }
    currentDoc = snap.data();
  } catch (err) {
    hideLoading();
    alert('讀取失敗：' + err.message);
    return;
  }

  if (!currentDoc.photoFrontURL) {
    hideLoading();
    alert('找不到正面照片資料');
    return;
  }

  showLoading('Claude 判讀中，請稍候（約30秒）...');

  try {
    const front = parseDataURL(currentDoc.photoFrontURL);
    let side = { base64: null, mediaType: null };
    if (currentDoc.photoSideURL) {
      side = parseDataURL(currentDoc.photoSideURL);
    }

    if (!front.base64) {
      hideLoading();
      alert('照片 base64 資料為空，請重新上傳照片');
      return;
    }

    const body = {
      frontImage: front.base64,
      frontType: front.mediaType,
      sideImage: side.base64,
      sideType: side.mediaType,
      questions: buildQuestionPrompt()
    };

    const resp = await fetch(CLOUD_FN_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });

    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      throw new Error(err.error || `HTTP ${resp.status}`);
    }

    const data = await resp.json();

    // Normalize results: ensure all expected keys exist
    const results = {};
    for (const { key } of ALL_KEYS) {
      if (data.results[key]) {
        results[key] = data.results[key];
      } else {
        results[key] = { answer: null, confidence: null };
      }
    }

    currentDoc.claudeResults = results;
    recalcStats();

    await db.collection(COL).doc(currentDocId).update({
      claudeResults: results,
      stats: currentDoc.stats,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    });

    hideLoading();
    renderDetail();
  } catch (err) {
    hideLoading();
    alert('Claude 判讀失敗：' + err.message);
  }
}

// ============================================================
// Delete Record
// ============================================================
async function deleteRecord() {
  if (!confirm('確定刪除此記錄？此操作無法復原。')) return;
  showLoading('刪除中...');
  try {
    await db.collection(COL).doc(currentDocId).delete();
    hideLoading();
    currentDocId = null;
    currentDoc = null;
    showView('list');
  } catch (err) {
    hideLoading();
    alert('刪除失敗：' + err.message);
  }
}

// ============================================================
// Lightbox
// ============================================================
function showLightbox(url) {
  document.getElementById('lightboxImg').src = url;
  document.getElementById('lightbox').classList.add('show');
}

// ============================================================
// Loading
// ============================================================
function showLoading(text) {
  document.getElementById('loadingText').textContent = text || '處理中...';
  document.getElementById('loadingOverlay').classList.add('show');
}
function hideLoading() {
  document.getElementById('loadingOverlay').classList.remove('show');
}

loadList();
