<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>照片輔助觀察訓練</title>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #1e2127;
  --bg2: #262930;
  --bg3: #2c2f36;
  --border: #3a3d44;
  --text: #e8e0d0;
  --text2: #b0a898;
  --text3: #7a7468;
  --accent: #C17A5A;
  --green: #7A9E7E;
  --red: #c03830;
  --gold: #9a7c4a;
  --blue: #5a8abf;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  font-family: 'Noto Serif TC', serif;
  color: var(--text);
  min-height: 100vh;
  -webkit-text-size-adjust: 100%;
}
button { font-family: 'Noto Serif TC', serif; cursor: pointer; }
input { font-family: 'Noto Serif TC', serif; }

/* ===== Top Nav ===== */
.top-nav {
  height: 48px;
  background: #16181c;
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 12px;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
}
.nav-brand {
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 2px;
  color: var(--text);
  white-space: nowrap;
}
.nav-back {
  background: none;
  border: 1px solid var(--border);
  color: var(--text2);
  font-size: 13px;
  padding: 4px 12px;
  border-radius: 4px;
}
.nav-back:hover { border-color: var(--text2); color: var(--text); }
.nav-spacer { flex: 1; }
.nav-stats {
  font-size: 12px;
  color: var(--text3);
  letter-spacing: 1px;
}

/* ===== View: List ===== */
.view { display: none; }
.view.active { display: block; }

.list-header {
  padding: 24px 20px 16px;
  display: flex;
  align-items: center;
  gap: 16px;
  border-bottom: 1px solid var(--border);
}
.list-header h1 {
  font-size: 20px;
  font-weight: 900;
  letter-spacing: 3px;
  flex: 1;
}
.btn-add {
  background: var(--accent);
  color: white;
  border: none;
  padding: 8px 20px;
  border-radius: 6px;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 1px;
}
.btn-add:hover { opacity: 0.9; }

.photo-list {
  padding: 12px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 12px;
}
.photo-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px;
  cursor: pointer;
  transition: border-color 0.15s;
}
.photo-card:hover { border-color: var(--accent); }
.photo-card-top {
  display: flex;
  gap: 12px;
  margin-bottom: 10px;
}
.photo-thumb {
  width: 64px;
  height: 64px;
  border-radius: 6px;
  object-fit: cover;
  background: var(--bg3);
  flex-shrink: 0;
}
.photo-card-info { flex: 1; min-width: 0; }
.photo-card-name {
  font-size: 15px;
  font-weight: 700;
  margin-bottom: 4px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.photo-card-date {
  font-size: 12px;
  color: var(--text3);
}
.photo-card-bar {
  height: 4px;
  background: var(--bg3);
  border-radius: 2px;
  overflow: hidden;
  margin-bottom: 6px;
}
.photo-card-bar-fill {
  height: 100%;
  border-radius: 2px;
  transition: width 0.3s;
}
.photo-card-stats {
  font-size: 12px;
  color: var(--text2);
  display: flex;
  gap: 12px;
}

.empty-state {
  text-align: center;
  padding: 80px 20px;
  color: var(--text3);
}
.empty-state p { font-size: 16px; margin-bottom: 20px; letter-spacing: 2px; }

/* ===== View: Upload ===== */
.upload-container {
  max-width: 520px;
  margin: 0 auto;
  padding: 32px 20px;
}
.upload-container h2 {
  font-size: 18px;
  font-weight: 900;
  letter-spacing: 2px;
  margin-bottom: 24px;
}
.form-group {
  margin-bottom: 20px;
}
.form-group label {
  display: block;
  font-size: 13px;
  font-weight: 700;
  color: var(--text2);
  margin-bottom: 8px;
  letter-spacing: 1px;
}
.form-group input[type="text"] {
  width: 100%;
  background: var(--bg2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 10px 14px;
  border-radius: 6px;
  font-size: 15px;
}
.form-group input[type="text"]:focus {
  outline: none;
  border-color: var(--accent);
}
.upload-add-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--bg2);
  border: 2px dashed var(--border);
  color: var(--text2);
  padding: 10px 20px;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 700;
  position: relative;
  overflow: hidden;
}
.upload-add-btn:hover { border-color: var(--accent); color: var(--text); }
.upload-add-btn input[type="file"] {
  position: absolute;
  inset: 0;
  opacity: 0;
  cursor: pointer;
}
.upload-photo-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-top: 12px;
}
.upload-photo-item {
  position: relative;
  width: 100px;
  border-radius: 6px;
  overflow: hidden;
  border: 2px solid var(--border);
  background: var(--bg3);
}
.upload-photo-item img {
  width: 100%;
  height: 80px;
  object-fit: cover;
  display: block;
}
.upload-photo-item select {
  width: 100%;
  background: var(--bg2);
  color: var(--text2);
  border: none;
  border-top: 1px solid var(--border);
  font-size: 11px;
  padding: 3px 4px;
  font-family: 'Noto Serif TC', serif;
}
.upload-photo-remove {
  position: absolute;
  top: 2px;
  right: 2px;
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: rgba(0,0,0,0.6);
  color: white;
  border: none;
  font-size: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0;
}
.btn-submit {
  width: 100%;
  background: var(--accent);
  color: white;
  border: none;
  padding: 14px;
  border-radius: 8px;
  font-size: 16px;
  font-weight: 900;
  letter-spacing: 2px;
  margin-top: 8px;
}
.btn-submit:disabled { opacity: 0.4; cursor: not-allowed; }

/* ===== View: Detail — Split Pane ===== */
.detail-split {
  display: flex;
  height: calc(100vh - 48px);
  overflow: hidden;
}
.detail-left {
  width: 55%;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  border-right: 1px solid var(--border);
}
.detail-left-scroll {
  flex: 1;
  overflow-y: auto;
}
.detail-right {
  width: 45%;
  display: flex;
  flex-direction: column;
  background: var(--bg2);
  overflow: hidden;
}

.detail-status {
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  flex-shrink: 0;
}
.status-badge {
  font-size: 12px;
  font-weight: 700;
  padding: 4px 12px;
  border-radius: 4px;
  letter-spacing: 1px;
}
.status-badge.pending { background: var(--bg3); color: var(--text3); }
.status-badge.loading { background: #3a3520; color: #d4a834; }
.status-badge.done { background: #1e3320; color: var(--green); }
.btn-claude {
  background: var(--blue);
  color: white;
  border: none;
  padding: 6px 16px;
  border-radius: 4px;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 1px;
}
.btn-claude:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-delete-record {
  background: none;
  border: 1px solid var(--red);
  color: var(--red);
  padding: 4px 12px;
  border-radius: 4px;
  font-size: 12px;
  font-weight: 700;
}
.btn-delete-record:hover { background: var(--red); color: white; }

.detail-progress {
  padding: 8px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 12px;
  color: var(--text2);
  flex-shrink: 0;
}
.progress-bar {
  flex: 1;
  height: 6px;
  background: var(--bg3);
  border-radius: 3px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: var(--green);
  border-radius: 3px;
  transition: width 0.3s;
}
.accuracy-num { font-weight: 700; color: var(--green); }

/* ===== Photo Thumbnail Strip ===== */
.photo-thumb-strip {
  display: flex;
  gap: 6px;
  padding: 8px 10px;
  overflow-x: auto;
  background: var(--bg3);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.photo-thumb-item {
  flex-shrink: 0;
  width: 56px;
  cursor: pointer;
  border-radius: 4px;
  overflow: hidden;
  border: 2px solid transparent;
  transition: border-color 0.15s;
  position: relative;
}
.photo-thumb-item.active { border-color: var(--accent); }
.photo-thumb-item:hover { border-color: var(--text3); }
.photo-thumb-item img {
  width: 100%;
  height: 42px;
  object-fit: cover;
  display: block;
}
.photo-thumb-label {
  font-size: 9px;
  text-align: center;
  color: var(--text3);
  background: var(--bg2);
  padding: 0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.photo-thumb-label select {
  width: 100%;
  background: var(--bg2);
  color: var(--text3);
  border: none;
  font-size: 9px;
  padding: 1px 0;
  text-align: center;
  font-family: 'Noto Serif TC', serif;
  cursor: pointer;
}

/* ===== Photo Viewer (right pane) ===== */
.photo-viewer {
  flex: 1;
  overflow: hidden;
  position: relative;
  cursor: grab;
}
.photo-viewer:active { cursor: grabbing; }
.photo-viewer-inner {
  transform-origin: 0 0;
  will-change: transform;
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.photo-viewer-inner img {
  width: 100%;
  border-radius: 6px;
  user-select: none;
  -webkit-user-drag: none;
  pointer-events: none;
}
.photo-zoom-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 12px;
  background: var(--bg3);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  font-size: 12px;
  color: var(--text2);
}
.photo-zoom-bar button {
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text2);
  width: 28px;
  height: 28px;
  border-radius: 4px;
  font-size: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.photo-zoom-bar button:hover { border-color: var(--text2); color: var(--text); }
.zoom-pct { min-width: 44px; text-align: center; font-weight: 700; }

/* ===== Part Index Nav ===== */
.part-index-nav {
  display: flex;
  gap: 2px;
  padding: 6px 8px;
  overflow-x: auto;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  scrollbar-width: none;
}
.part-index-nav::-webkit-scrollbar { display: none; }
.part-idx {
  flex-shrink: 0;
  padding: 3px 7px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 700;
  cursor: pointer;
  white-space: nowrap;
  border: 1px solid transparent;
  transition: all 0.1s;
  color: var(--text3);
  background: transparent;
}
.part-idx:hover { background: var(--bg3); }
.part-idx.idx-active { background: var(--bg3); border-color: var(--accent); color: var(--text); }
.part-idx.idx-done { color: var(--green); }
.part-idx.idx-partial { color: #d4a834; }
.part-idx .idx-count {
  font-size: 9px;
  font-weight: 500;
  margin-left: 2px;
  opacity: 0.7;
}

/* ===== Review Section ===== */
.review-sections {
  padding-bottom: 40px;
}
.section-header {
  position: sticky;
  top: 0;
  z-index: 10;
  background: var(--bg3);
  padding: 10px 16px;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 2px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 8px;
}
.section-count {
  font-size: 12px;
  color: var(--text3);
  font-weight: 500;
}

.review-card {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
}
.review-card.reviewed { background: var(--bg2); }

.review-q-top {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  margin-bottom: 8px;
  flex-wrap: wrap;
}
.review-qid {
  font-size: 11px;
  font-family: monospace;
  color: var(--text3);
  background: var(--bg3);
  padding: 2px 6px;
  border-radius: 3px;
  flex-shrink: 0;
}
.review-cat {
  font-size: 10px;
  font-weight: 700;
  padding: 2px 6px;
  border-radius: 3px;
  flex-shrink: 0;
}
.review-cat.cat-A { background: #1e3320; color: var(--green); }
.review-cat.cat-B { background: #3a3520; color: #d4a834; }
.review-cat.cat-C { background: #3a2020; color: #c06060; }
.review-q-text {
  font-size: 14px;
  font-weight: 700;
  flex: 1;
  min-width: 0;
}

/* LR layout */
.review-lr-wrap {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.review-lr-col {
  background: var(--bg3);
  border-radius: 6px;
  padding: 10px;
}
.review-lr-label {
  font-size: 11px;
  font-weight: 700;
  color: var(--text3);
  margin-bottom: 6px;
  letter-spacing: 1px;
}

/* Claude answer display */
.claude-answer {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 8px;
  flex-wrap: wrap;
}
.claude-val {
  font-size: 14px;
  font-weight: 700;
  color: var(--blue);
}
.claude-null {
  font-size: 13px;
  color: var(--text3);
  font-style: italic;
}
.conf-badge {
  font-size: 10px;
  font-weight: 700;
  padding: 1px 6px;
  border-radius: 3px;
}
.conf-H { background: #1e3320; color: var(--green); }
.conf-M { background: #3a3520; color: #d4a834; }
.conf-L { background: #3a2020; color: #c06060; }

/* Review buttons */
.review-btns {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.rbtn {
  font-size: 12px;
  font-weight: 700;
  padding: 5px 12px;
  border-radius: 4px;
  border: 1px solid var(--border);
  background: var(--bg);
  color: var(--text2);
  letter-spacing: 1px;
  transition: all 0.1s;
}
.rbtn:hover { border-color: var(--text2); }
.rbtn.sel-correct { background: var(--green); color: white; border-color: var(--green); }
.rbtn.sel-wrong { background: var(--red); color: white; border-color: var(--red); }
.rbtn.sel-cannot { background: var(--text3); color: white; border-color: var(--text3); }

/* Correct answer selector (when marked wrong) */
.correct-select {
  margin-top: 6px;
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
}
.correct-opt {
  font-size: 11px;
  padding: 3px 8px;
  border-radius: 3px;
  border: 1px solid var(--border);
  background: var(--bg);
  color: var(--text2);
}
.correct-opt:hover { border-color: var(--accent); }
.correct-opt.selected { background: var(--accent); color: white; border-color: var(--accent); }

/* Photo lightbox */
.lightbox {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.9);
  z-index: 9999;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}
.lightbox.show { display: flex; }
.lightbox img {
  max-width: 95vw;
  max-height: 95vh;
  object-fit: contain;
}

/* Loading overlay */
.loading-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 9000;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 16px;
}
.loading-overlay.show { display: flex; }
.spinner {
  width: 40px;
  height: 40px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { color: var(--text2); font-size: 14px; letter-spacing: 2px; }

@media (max-width: 768px) {
  .detail-split { flex-direction: column-reverse; height: auto; min-height: calc(100vh - 48px); }
  .detail-left { width: 100%; border-right: none; height: auto; overflow: visible; }
  .detail-left-scroll { overflow: visible; }
  .detail-right { width: 100%; height: 40vh; min-height: 200px; border-bottom: 1px solid var(--border); }
  .section-header { top: 0; }
  .review-lr-wrap { grid-template-columns: 1fr; }
  .photo-list { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- Top Nav -->
<div class="top-nav">
  <div class="nav-brand">照片觀察訓練</div>
  <button class="nav-back" id="navBack" style="display:none" onclick="showView('list')">← 返回清單</button>
  <div class="nav-spacer"></div>
  <div class="nav-stats" id="navStats"></div>
</div>

<!-- View: List -->
<div class="view active" id="viewList">
  <div class="list-header">
    <h1>照片記錄</h1>
    <button class="btn-add" onclick="showView('upload')">＋ 新增照片</button>
  </div>
  <div id="photoList" class="photo-list"></div>
  <div id="emptyState" class="empty-state" style="display:none">
    <p>尚無照片記錄</p>
    <button class="btn-add" onclick="showView('upload')">＋ 新增第一張照片</button>
  </div>
</div>

<!-- View: Upload -->
<div class="view" id="viewUpload">
  <div class="upload-container">
    <h2>新增照片</h2>
    <div class="form-group">
      <label>標示名稱</label>
      <input type="text" id="inputName" placeholder="例如：案例01" />
    </div>
    <div class="form-group">
      <label>照片（至少一張）</label>
      <button class="upload-add-btn" type="button">
        ＋ 新增照片
        <input type="file" accept="image/*" multiple onchange="handleMultiFiles(this)" />
      </button>
      <div class="upload-photo-grid" id="uploadPhotoGrid"></div>
    </div>
    <button class="btn-submit" id="btnUpload" disabled onclick="doUpload()">建立並上傳</button>
  </div>
</div>

<!-- View: Detail -->
<div class="view" id="viewDetail">
  <div class="detail-split">
    <div class="detail-left">
      <div class="detail-status" id="detailStatus"></div>
      <div class="detail-progress" id="detailProgress" style="display:none"></div>
      <div class="part-index-nav" id="partIndexNav" style="display:none"></div>
      <div class="detail-left-scroll" id="detailLeftScroll">
        <div class="review-sections" id="reviewSections"></div>
      </div>
    </div>
    <div class="detail-right">
      <div class="photo-zoom-bar">
        <button onclick="photoZoom(-0.25)">−</button>
        <span class="zoom-pct" id="zoomPct">100%</span>
        <button onclick="photoZoom(0.25)">+</button>
        <button onclick="photoReset()" style="font-size:12px;width:auto;padding:0 8px">重置</button>
        <span id="photoLabel" style="margin-left:auto;font-size:11px;color:var(--text3)"></span>
      </div>
      <div class="photo-viewer" id="photoViewer">
        <div class="photo-viewer-inner" id="photoViewerInner"></div>
      </div>
      <div class="photo-thumb-strip" id="photoThumbStrip"></div>
    </div>
  </div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="this.classList.remove('show')">
  <img id="lightboxImg" />
</div>

<!-- Loading -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-text" id="loadingText">處理中...</div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
// ============================================================
// Firebase Init
// ============================================================
firebase.initializeApp({
  apiKey: "AIzaSyCZUzTOaCtbzXuX_mz5VoFvZ2Sva1Obza8",
  authDomain: "renxiangbingfa.firebaseapp.com",
  projectId: "renxiangbingfa",
  storageBucket: "renxiangbingfa.firebasestorage.app",
  messagingSenderId: "912262878667",
  appId: "1:912262878667:web:cd7a74f1378221dbe3524e"
});
const db = firebase.firestore();

// Firebase part key → display part name
const PART_KEY_MAP = {"頭":"頭","額":"上停","耳":"耳","眉":"眉","眼":"眼","鼻":"鼻","顴":"顴","口":"口","人中":"人中","地閣":"地閣","頤":"頤"};
const PART_ORDER = ["頭","額","耳","眉","眼","鼻","顴","口","人中","地閣","頤"];

// ============================================================
// Questions — mutable, loaded from Firebase or fallback
// ============================================================
let QUESTIONS = [];
let PARTS = [];
let PART_LABELS = {};
let ALL_KEYS = [];

// Convert Firebase format to flat QUESTIONS array
function convertFirebaseQuestions(fbData) {
  const result = [];
  for (const partKey of PART_ORDER) {
    const partData = fbData[partKey];
    if (!partData || !partData.sections) continue;
    const displayPart = PART_KEY_MAP[partKey] || partKey;
    for (const sec of partData.sections) {
      for (const q of (sec.qs || [])) {
        result.push({
          qId: q.id,
          part: displayPart,
          section: sec.label || sec.name || '',
          text: q.text,
          cat: CAT_MAP[q.id] || 'B',
          lr: !!q.paired,
          options: (q.opts || []).map(o => typeof o === 'string' ? o : o.v)
        });
      }
    }
  }
  return result;
}

function rebuildDerivedData() {
  // Rebuild PARTS, PART_LABELS, ALL_KEYS from QUESTIONS
  const seen = new Set();
  PARTS = [];
  PART_LABELS = {};
  for (const q of QUESTIONS) {
    if (!seen.has(q.part)) {
      seen.add(q.part);
      PARTS.push(q.part);
      // Label: "上停" → "上停（額）", others same
      PART_LABELS[q.part] = q.part === '上停' ? '上停（額）' : q.part;
    }
  }
  ALL_KEYS = [];
  for (const q of QUESTIONS) {
    if (q.lr) {
      ALL_KEYS.push({ key: q.qId + '_L', q, side: '左' });
      ALL_KEYS.push({ key: q.qId + '_R', q, side: '右' });
    } else {
      ALL_KEYS.push({ key: q.qId, q, side: null });
    }
  }
}

// Build question text for Claude prompt
function buildQuestionPrompt() {
  const total = QUESTIONS.length;
  let text = `以下是 ${total} 題觀察問題，請逐題根據照片回答。\n\n`;
  let currentPart = '';
  for (const q of QUESTIONS) {
    if (q.part !== currentPart) {
      currentPart = q.part;
      const count = QUESTIONS.filter(x => x.part === currentPart).length;
      text += `\n## ${PART_LABELS[currentPart] || currentPart}（${count}題）\n`;
    }
    const lr = q.lr ? ' [左右]' : '';
    text += `${q.qId}${lr} ${q.text}：${q.options.join(' / ')}\n`;
  }
  return text;
}

function fileToDataURL(file, maxDim) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const max = maxDim || 1200;
        let w = img.width, h = img.height;
        if (w > max || h > max) {
          if (w > h) { h = Math.round(h * max / w); w = max; }
          else { w = Math.round(w * max / h); h = max; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', 0.8));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function handleMultiFiles(input) {
  const files = Array.from(input.files);
  if (!files.length) return;
  for (const file of files) {
    const type = uploadPhotos.length === 0 ? '正面' : '其他';
    const reader = new FileReader();
    reader.onload = e => {
      uploadPhotos.push({ file, preview: e.target.result, type });
      renderUploadGrid();
      checkUploadReady();
    };
    reader.readAsDataURL(file);
  }
  input.value = '';
}

function removeUploadPhoto(idx) {
  uploadPhotos.splice(idx, 1);
  renderUploadGrid();
  checkUploadReady();
}

function changeUploadType(idx, val) {
  uploadPhotos[idx].type = val;
}

function renderUploadGrid() {
  const grid = document.getElementById('uploadPhotoGrid');
  grid.innerHTML = uploadPhotos.map((p, i) => `
    <div class="upload-photo-item">
      <img src="${p.preview}" />
      <button class="upload-photo-remove" onclick="removeUploadPhoto(${i})">✕</button>
      ${angleSelectHTML(p.type, `onchange="changeUploadType(${i},this.value)"`)}
    </div>
  `).join('');
}

function checkUploadReady() {
  const name = document.getElementById('inputName').value.trim();
  document.getElementById('btnUpload').disabled = !(name && uploadPhotos.length > 0);
}

document.getElementById('inputName').addEventListener('input', checkUploadReady);

async function doUpload() {
  const name = document.getElementById('inputName').value.trim();
  if (!name || !uploadPhotos.length) return;

  showLoading('處理照片中...');

  try {
    const photos = [];
    for (let i = 0; i < uploadPhotos.length; i++) {
      const dataURL = await fileToDataURL(uploadPhotos[i].file, 1200);
      photos.push({ dataURL, type: uploadPhotos[i].type, index: i });
    }

    showLoading('儲存中...');

    const docRef = await db.collection(COL).add({
      name,
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
      photos,
      claudeResults: null,
      mikeReview: {},
      stats: { totalJudged: 0, reviewed: 0, correct: 0, wrong: 0, cannot: 0, accuracy: 0 }
    });

    // Reset
    uploadPhotos = [];
    document.getElementById('inputName').value = '';
    document.getElementById('uploadPhotoGrid').innerHTML = '';
    document.getElementById('btnUpload').disabled = true;

    hideLoading();
    openDetail(docRef.id);
  } catch (err) {
    hideLoading();
    alert('上傳失敗：' + err.message);
  }
}

// Get photos array (backward compat with old photoFrontURL/photoSideURL format)
function getPhotos(d) {
  if (d.photos && d.photos.length > 0) {
    // Ensure all photos have a type (backward compat for photos saved before angle feature)
    return d.photos.map((p, i) => ({
      ...p,
      type: p.type || (i === 0 ? '正面' : '其他')
    }));
  }
  const arr = [];
  if (d.photoFrontURL) arr.push({ dataURL: d.photoFrontURL, type: '正面', index: 0 });
  if (d.photoSideURL) arr.push({ dataURL: d.photoSideURL, type: '左側90°', index: 1 });
  return arr;
}

function showPhoto(idx) {
  const photos = getPhotos(currentDoc);
  if (idx < 0 || idx >= photos.length) return;
  currentPhotoIdx = idx;
  const viewerInner = document.getElementById('photoViewerInner');
  viewerInner.innerHTML = `<img src="${photos[idx].dataURL}" title="${esc(photos[idx].type)}" />`;
  document.getElementById('photoLabel').textContent = `${photos[idx].type}（${idx+1}/${photos.length}）`;
  // Highlight active thumb
  document.querySelectorAll('.photo-thumb-item').forEach((el, i) => {
    el.classList.toggle('active', i === idx);
  });
  photoReset();
}

async function addPhotosToRecord(input) {
  const files = Array.from(input.files);
  if (!files.length || !currentDocId || !currentDoc) return;
  input.value = '';

  showLoading('處理照片中...');
  try {
    const photos = getPhotos(currentDoc);
    for (const file of files) {
      const dataURL = await fileToDataURL(file, 1200);
      photos.push({ dataURL, type: '其他', index: photos.length });
    }
    currentDoc.photos = photos;
    await db.collection(COL).doc(currentDocId).update({
      photos,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    hideLoading();
    renderDetail();
    // Show last added photo
    showPhoto(photos.length - 1);
  } catch (err) {
    hideLoading();
    alert('新增照片失敗：' + err.message);
  }
}

async function changePhotoAngle(idx, newType) {
  if (!currentDocId || !currentDoc) return;
  const photos = getPhotos(currentDoc);
  if (idx < 0 || idx >= photos.length) return;
  photos[idx].type = newType;
  currentDoc.photos = photos;
  // Update label display
  document.querySelectorAll('.photo-thumb-label')[idx].textContent = newType;
  if (idx === currentPhotoIdx) {
    document.getElementById('photoLabel').textContent = `${newType}（${idx+1}/${photos.length}）`;
  }
  try {
    await db.collection(COL).doc(currentDocId).update({
      photos,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    });
  } catch (err) {
    console.error('Failed to save angle change:', err);
  }
}

function renderProgress() {
  const d = currentDoc;
  const progEl = document.getElementById('detailProgress');

  if (!d.claudeResults) {

    return;

  progEl.style.display = '';

  const correct = stats.correct || 0;
  const wrong = stats.wrong || 0;
  const cannot = stats.cannot || 0;
  const acc = (correct + wrong) > 0 ? (correct / (correct + wrong) * 100).toFixed(1) : '—';

  const claudeJudged = stats.claudeJudged || stats.totalJudged || 0;

  progEl.innerHTML = `
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>

function renderPartIndex() {
  const nav = document.getElementById('partIndexNav');
  if (!currentDoc || !currentDoc.claudeResults) {
    nav.style.display = 'none';
    return;
  }
  nav.style.display = '';
  const mr = currentDoc.mikeReview || {};

  nav.innerHTML = PARTS.map(part => {
    const qs = QUESTIONS.filter(q => q.part === part);
    const partTotal = qs.reduce((sum, q) => sum + (q.lr ? 2 : 1), 0);
    const partDone = qs.reduce((sum, q) => {
      if (q.lr) return sum + (mr[q.qId+'_L'] ? 1 : 0) + (mr[q.qId+'_R'] ? 1 : 0);
      return sum + (mr[q.qId] ? 1 : 0);
    }, 0);
    const cls = partDone === partTotal ? 'idx-done' : partDone > 0 ? 'idx-partial' : '';
    return `<div class="part-idx ${cls}" data-part="${part}" onclick="scrollToPart('${part}')">${PART_LABELS[part] || part}<span class="idx-count">${partDone}/${partTotal}</span></div>`;
  }).join('');
}

function scrollToPart(part) {
  const el = document.getElementById('sec-' + part);
  const scroll = document.getElementById('detailLeftScroll');
  if (el && scroll) {
    scroll.scrollTo({ top: el.offsetTop - scroll.offsetTop, behavior: 'smooth' });
  }
}

// Track active section on scroll
let scrollRAF = null;
function initScrollSpy() {
  const scroll = document.getElementById('detailLeftScroll');
  if (!scroll) return;
  scroll.addEventListener('scroll', () => {
    if (scrollRAF) return;
    scrollRAF = requestAnimationFrame(() => {
      scrollRAF = null;
      const tops = PARTS.map(p => {
        const el = document.getElementById('sec-' + p);
        return el ? { part: p, top: el.offsetTop - scroll.offsetTop - scroll.scrollTop } : null;
      }).filter(Boolean);
      let active = tops[0]?.part;
      for (const t of tops) {
        if (t.top <= 10) active = t.part;
      }
      document.querySelectorAll('.part-idx').forEach(el => {
        el.classList.toggle('idx-active', el.dataset.part === active);
      });
    });
  });
}

function renderReview() {
  const d = currentDoc;
  const cr = d.claudeResults || {};
  const mr = d.mikeReview || {};
  const container = document.getElementById('reviewSections');
  let html = '';
  let currentPart = '';

  for (const part of PARTS) {
    const qs = QUESTIONS.filter(q => q.part === part);
    if (!qs.length) continue;

    const partReviewCount = qs.reduce((sum, q) => {
      if (q.lr) {
        return sum + (mr[q.qId+'_L'] ? 1 : 0) + (mr[q.qId+'_R'] ? 1 : 0);
      }
      return sum + (mr[q.qId] ? 1 : 0);
    }, 0);
    const partTotal = qs.reduce((sum, q) => sum + (q.lr ? 2 : 1), 0);

    html += `<div class="section-header" id="sec-${part}">${PART_LABELS[part] || part} <span class="section-count">${partReviewCount}/${partTotal}</span></div>`;

    for (const q of qs) {
      html += `<div class="review-card ${isFullyReviewed(q, mr) ? 'reviewed' : ''}" id="card-${q.qId}">`;
      html += `<div class="review-q-top">
        <span class="review-qid">${q.qId}</span>
        <span class="review-cat cat-${q.cat}">${q.cat === 'A' ? '照片高' : q.cat === 'B' ? '照片中' : '照片難'}</span>
        <span class="review-q-text">${esc(q.text)}</span>
      </div>`;

      if (q.lr) {
        html += `<div class="review-lr-wrap">`;
        for (const side of ['L', 'R']) {
          const key = q.qId + '_' + side;
          const label = side === 'L' ? '左' : '右';
          html += `<div class="review-lr-col">
            <div class="review-lr-label">${label}</div>
            ${renderClaudeAnswer(key, cr)}
            ${renderReviewButtons(key, q, cr, mr)}
          </div>`;
        }
        html += `</div>`;
      } else {
        html += renderClaudeAnswer(q.qId, cr);
        html += renderReviewButtons(q.qId, q, cr, mr);
      }

      html += `</div>`;
    }
  }

  container.innerHTML = html;
}

function isFullyReviewed(q, mr) {
  if (q.lr) return !!(mr[q.qId+'_L'] && mr[q.qId+'_R']);
  return !!mr[q.qId];
}

function renderClaudeAnswer(key, cr) {
  const r = cr[key];
  if (!r || r.answer == null) {
    return `<div class="claude-answer"><span class="claude-null">Claude 無法判斷</span></div>`;
  }
  const confClass = r.confidence ? 'conf-' + r.confidence : '';
  const confText = r.confidence || '';
  return `<div class="claude-answer">
    <span class="claude-val">${esc(r.answer)}</span>
    ${confText ? `<span class="conf-badge ${confClass}">${confText}</span>` : ''}
  </div>`;
}

function renderReviewButtons(key, q, cr, mr) {
  const review = mr[key];
  const claudeResult = cr[key];
  const hasAnswer = claudeResult && claudeResult.answer != null;

  let html = '<div class="review-btns">';

  if (hasAnswer) {
    const isCorrect = review && review.status === 'correct';
    const isWrong = review && review.status === 'wrong';
    const isCannot = review && review.status === 'cannot';

    html += `<button class="rbtn ${isCorrect ? 'sel-correct' : ''}" onclick="markReview('${key}','correct')">✓ 對</button>`;
    html += `<button class="rbtn ${isWrong ? 'sel-wrong' : ''}" onclick="markReview('${key}','wrong')">✗ 錯</button>`;
    html += `<button class="rbtn ${isCannot ? 'sel-cannot' : ''}" onclick="markReview('${key}','cannot')">⊘ 無法判</button>`;
    html += `</div>`;

    // If marked wrong, show correct answer selector
    if (isWrong) {
      html += `<div class="correct-select">`;
      for (const opt of q.options) {
        if (opt === claudeResult.answer) continue; // skip the wrong answer
        const selected = review.correctAnswer === opt;
        html += `<button class="correct-opt ${selected ? 'selected' : ''}" onclick="setCorrectAnswer('${key}','${opt.replace(/'/g, "\\'")}')">
          ${esc(opt)}
        </button>`;
      }
      html += `</div>`;
    }
  } else {
    // Claude couldn't judge - Mike can fill in or mark cannot
    const isCannot = review && review.status === 'cannot';
    html += `<button class="rbtn ${isCannot ? 'sel-cannot' : ''}" onclick="markReview('${key}','cannot')">⊘ 無法判</button>`;
    html += `</div>`;
    // Let Mike pick an answer directly
    html += `<div class="correct-select" style="margin-top:6px">`;
    for (const opt of q.options) {
      const selected = review && review.status === 'filled' && review.correctAnswer === opt;
      html += `<button class="correct-opt ${selected ? 'selected' : ''}" onclick="fillAnswer('${key}','${opt.replace(/'/g, "\\'")}')">
        ${esc(opt)}
      </button>`;
    }
    html += `</div>`;
  }

  return html;
}

// ============================================================
// Review Actions
// ============================================================
async function markReview(key, status) {
  if (!currentDocId || !currentDoc) return;
  const mr = currentDoc.mikeReview || {};

  if (status === 'correct' || status === 'cannot') {
    mr[key] = { status };
  } else if (status === 'wrong') {
    mr[key] = { status: 'wrong', correctAnswer: null };
  }

  currentDoc.mikeReview = mr;
  recalcStats();
  renderReview();
  renderPartIndex();
  renderProgress();
  saveReview();
}

async function setCorrectAnswer(key, answer) {
  if (!currentDocId || !currentDoc) return;
  const mr = currentDoc.mikeReview || {};
  if (mr[key]) {
    mr[key].correctAnswer = answer;
  }
  currentDoc.mikeReview = mr;
  renderReview();
  saveReview();
}

async function fillAnswer(key, answer) {
  if (!currentDocId || !currentDoc) return;
  const mr = currentDoc.mikeReview || {};
  mr[key] = { status: 'filled', correctAnswer: answer };
  currentDoc.mikeReview = mr;
  recalcStats();
  renderReview();
  renderPartIndex();
  renderProgress();
  saveReview();
}

function recalcStats() {
  const mr = currentDoc.mikeReview || {};
  const cr = currentDoc.claudeResults || {};
  let reviewed = 0, correct = 0, wrong = 0, cannot = 0, totalJudged = 0;

  for (const { key } of ALL_KEYS) {
    const c = cr[key];
    if (c && c.answer != null) totalJudged++;
    const r = mr[key];
    if (r) {
      reviewed++;
      if (r.status === 'correct') correct++;
      else if (r.status === 'wrong') wrong++;
      else if (r.status === 'cannot' || r.status === 'filled') cannot++;
    }
  }

  const accuracy = (correct + wrong) > 0 ? (correct / (correct + wrong) * 100) : 0;
  currentDoc.stats = { totalJudged, claudeJudged: totalJudged, reviewed, correct, wrong, cannot, accuracy };
}

let saveTimer = null;
function saveReview() {
  if (saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    if (!currentDocId) return;
    try {
      await db.collection(COL).doc(currentDocId).update({
        mikeReview: currentDoc.mikeReview,
        stats: currentDoc.stats,
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      });
    } catch (err) {
      console.error('Save failed:', err);
    }
  }, 500);
}

// ============================================================
// Claude Vision
// ============================================================
function parseDataURL(dataURL) {
  if (!dataURL) return { base64: null, mediaType: null };
  const match = dataURL.match(/^data:(image\/[a-z]+);base64,(.+)$/s);
  if (match) {
    return { base64: match[2].replace(/\s/g, ''), mediaType: match[1] };
  }
  // Already raw base64
  return { base64: dataURL.replace(/\s/g, ''), mediaType: 'image/jpeg' };
}

async function startClaude() {
  if (!currentDoc) return;

  // Re-read from Firestore to ensure we have the full document
  showLoading('讀取照片中...');
  try {
    const snap = await db.collection(COL).doc(currentDocId).get();
    if (!snap.exists) { hideLoading(); alert('記錄不存在'); return; }
    currentDoc = snap.data();
  } catch (err) {
    hideLoading();
    alert('讀取失敗：' + err.message);
    return;
  }

  const photos = getPhotos(currentDoc);
  if (photos.length === 0) {
    hideLoading();
    alert('找不到照片資料');
    return;
  }

  showLoading('Claude 判讀中，請稍候（約30秒）...');

  try {
    // Build images array for Cloud Function
    const images = photos.map(p => {
      const parsed = parseDataURL(p.dataURL);
      return { base64: parsed.base64, mediaType: parsed.mediaType, type: p.type };
    }).filter(img => img.base64);

    if (images.length === 0) {
      hideLoading();
      alert('照片 base64 資料為空，請重新上傳照片');
      return;
    }

    const body = {
      images,
      questions: buildQuestionPrompt()
    };

    const resp = await fetch(CLOUD_FN_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });

    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      throw new Error(err.error || `HTTP ${resp.status}`);
    }

    const data = await resp.json();

    // Normalize results: ensure all expected keys exist
    const results = {};
    for (const { key } of ALL_KEYS) {
      if (data.results[key]) {
        results[key] = data.results[key];
      } else {
        results[key] = { answer: null, confidence: null };
      }
    }

    currentDoc.claudeResults = results;
    recalcStats();

    await db.collection(COL).doc(currentDocId).update({
      claudeResults: results,
      stats: currentDoc.stats,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    });

    hideLoading();
    renderDetail();
  } catch (err) {
    hideLoading();
    alert('Claude 判讀失敗：' + err.message);
  }
}

// ============================================================
// Photo Viewer — Zoom & Pan
// ============================================================
let pvScale = 1;
let pvX = 0, pvY = 0;
let pvDragging = false;
let pvStartX, pvStartY, pvStartPanX, pvStartPanY;

function pvApply() {
  const inner = document.getElementById('photoViewerInner');
  if (inner) inner.style.transform = `translate(${pvX}px, ${pvY}px) scale(${pvScale})`;
  const pct = document.getElementById('zoomPct');
  if (pct) pct.textContent = Math.round(pvScale * 100) + '%';
}

function photoZoom(delta) {
  pvScale = Math.max(0.25, Math.min(5, pvScale + delta));
  pvApply();
}

function photoReset() {
  pvScale = 1; pvX = 0; pvY = 0;
  pvApply();
}

(function initPhotoViewer() {
  const viewer = document.getElementById('photoViewer');
  if (!viewer) return;

  // Mouse wheel zoom
  viewer.addEventListener('wheel', (e) => {
    e.preventDefault();
    const delta = e.deltaY > 0 ? -0.15 : 0.15;
    pvScale = Math.max(0.25, Math.min(5, pvScale + delta));
    pvApply();
  }, { passive: false });

  // Double click reset
  viewer.addEventListener('dblclick', () => photoReset());

  // Mouse drag pan
  viewer.addEventListener('mousedown', (e) => {
    if (e.button !== 0) return;
    pvDragging = true;
    pvStartX = e.clientX; pvStartY = e.clientY;
    pvStartPanX = pvX; pvStartPanY = pvY;
    e.preventDefault();
  });
  window.addEventListener('mousemove', (e) => {
    if (!pvDragging) return;
    pvX = pvStartPanX + (e.clientX - pvStartX);
    pvY = pvStartPanY + (e.clientY - pvStartY);
    pvApply();
  });
  window.addEventListener('mouseup', () => { pvDragging = false; });

  // Touch drag pan
  let pvTouchDist = 0;
  viewer.addEventListener('touchstart', (e) => {
    if (e.touches.length === 1) {
      pvDragging = true;
      pvStartX = e.touches[0].clientX; pvStartY = e.touches[0].clientY;
      pvStartPanX = pvX; pvStartPanY = pvY;
    } else if (e.touches.length === 2) {
      pvDragging = false;
      pvTouchDist = Math.hypot(e.touches[1].clientX - e.touches[0].clientX, e.touches[1].clientY - e.touches[0].clientY);
    }
  }, { passive: true });
  viewer.addEventListener('touchmove', (e) => {
    if (e.touches.length === 1 && pvDragging) {
      pvX = pvStartPanX + (e.touches[0].clientX - pvStartX);
      pvY = pvStartPanY + (e.touches[0].clientY - pvStartY);
      pvApply();
    } else if (e.touches.length === 2) {
      const dist = Math.hypot(e.touches[1].clientX - e.touches[0].clientX, e.touches[1].clientY - e.touches[0].clientY);
      if (pvTouchDist > 0) {
        pvScale = Math.max(0.25, Math.min(5, pvScale * (dist / pvTouchDist)));
        pvTouchDist = dist;
        pvApply();
      }
    }
  }, { passive: true });
  viewer.addEventListener('touchend', () => { pvDragging = false; pvTouchDist = 0; });
})();
